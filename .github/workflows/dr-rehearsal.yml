---
name: DR Rehearsal

"on":
  schedule:
    - cron: "0 4 * * 0"
  workflow_dispatch:

jobs:
  dr-rehearsal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          docker compose version
          go version

      - name: Build API image (DR rehearsal validates HEAD binary)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          load: true
          push: false
          tags: sbomhub/api:dr-rehearsal-${{ github.sha }}

      - name: Run DR rehearsal
        env:
          API_IMAGE: sbomhub/api:dr-rehearsal-${{ github.sha }}
        run: ./docker/scripts/dr-rehearsal.sh --verbose

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dr-rehearsal-report
          path: |
            /tmp/dr-rehearsal-*.json
            /tmp/dr-rehearsal-*.log
          if-no-files-found: ignore
