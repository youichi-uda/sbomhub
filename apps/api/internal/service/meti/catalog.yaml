  - id: meti.sbom_operation.07
    phase: sbom_operation
    title_ja: 作成した SBOM は、社外からの問合せがあった場合等に参照できるよう、変更履歴も含めて一定期間保管する
    verbatim_title_ja: 作成した SBOM は、社外からの問合せがあった場合等に参照できるよう、変更履歴も含めて一定期間保管する
    evaluator_text_ja: 作成した SBOM は、社外からの問合せがあった場合等に参照できるよう、変更履歴も含めて一定期間保管する
    title_en: Retain SBOMs for the required period (audit-ready)
    description_ja: |
      保管期間は、一般的に対象製品が市場に流通している間や対象サービスが提供されている期間は最低限としつつ、販売終了後も、保証期間、サポート提供期間、交換部品の提供期間等に必要に応じて SBOM を参照する可能性があるため、予め参照できるように準備しておく必要がある。さらに、使用しているコンポーネントのライセンスの条件で製品提供終了後 3 年等の個別の指定がある場合にはその期間も考慮する必要がある。
    description_en: |
      Retain SBOMs for the product lifetime plus the period required by
      regulation (CRA: throughout the product support window; sector
      regulations as applicable) in a tamper-evident form retrievable on
      demand, with hash / timestamp integrity checks available.
    evaluator_hint: "Auto-signal: sboms table retention policy enforced — no rows hard-deleted within retention window (check audit_log for delete events)."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (checklist No.1 変更履歴も含めた一定期間保管 / 本文 保管期間 — 製品流通中・販売終了後の保証期間・サポート提供期間・交換部品提供期間・ライセンス指定期間)"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 6.2 checklist No.1 □ 行
      「作成した SBOM は、社外からの問合せがあった場合等に参照できる
      よう、変更履歴も含めて一定期間保管する。」 (L.3727-3728) を末尾
      句点を除き byte-exact 転載。 description_ja は同節本文
      (L.3743-3748) を verbatim 連結 (保管期間の検討要素を含む)。
      M10-2 までの 「製品ライフタイム + 規制要求期間 (CRA) / ハッシュや
      タイムスタンプによる完全性確認」 distillation は M11-3 で primary
      文言に書き戻した (CRA / tamper-evident は evaluator_hint 側で保持)。
      sbom_creation.08 (バージョン管理・差分追跡) は同 6.2 No.1 を CI
