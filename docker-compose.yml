# SBOMHub - Quick Start Docker Compose
# Usage:
#   curl-only install path:
#     ./install.sh --start          # .env + roles + up を一気通貫
#   git-clone install path:
#     ./install.sh                  # .env だけ生成
#     docker compose up -d --wait postgres
#     ./install.sh --bootstrap-roles
#     docker compose up -d
# Open: http://localhost:3000
#
# Roles (P0 #2 / Trust Rescue 9.1.1):
#   - sbomhub          : POSTGRES_USER, db owner (superuser-equivalent inside
#                        this DB). Used only to bootstrap the two roles below.
#   - sbomhub_migrator : Runs migrations / DDL. CREATEDB + CREATEROLE, NOT
#                        BYPASSRLS. Used by MIGRATE_DATABASE_URL.
#   - sbomhub_app      : Runtime app role. SELECT/INSERT/UPDATE/DELETE only,
#                        NOBYPASSRLS so Row-Level Security is enforced. Used
#                        by DATABASE_URL.
#
# sbomhub_app / sbomhub_migrator は install.sh が docker compose exec 経由で
# psql に流して作成する (codex-r8: 旧 init.sh の bind mount は host file 依存で
# curl-only install では存在せず stack 全体を落とす罠だったため撤去)。
# fresh install / existing-volume upgrade のどちらも install.sh が role bootstrap
# の single source of truth。
#
# Override passwords by creating a .env file at the repo root (see .env.example).

services:
  api:
    image: y1uda/sbomhub-api:latest
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgres://sbomhub_app:${APP_PASSWORD:-sbomhub_app_dev}@postgres:5432/sbomhub?sslmode=disable
      - MIGRATE_DATABASE_URL=postgres://sbomhub_migrator:${MIGRATOR_PASSWORD:-sbomhub_migrator_dev}@postgres:5432/sbomhub?sslmode=disable
      - REDIS_URL=redis://redis:6379
      # SECURITY (P0 #5 / Trust Rescue 9.2.1): no bundled default. The api will
      # refuse to start when this is unset, a known default, or shorter than 32
      # bytes. Generate one with: openssl rand -base64 32
      - "ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is not set. Copy .env.example to .env and generate one with openssl rand -base64 32}"
      - NVD_API_KEY=${NVD_API_KEY:-}
      - APP_ENV=${APP_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  web:
    image: y1uda/sbomhub-web:latest
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    env_file:
      - path: .env
        required: false
    environment:
      - POSTGRES_USER=sbomhub
      - POSTGRES_PASSWORD=sbomhub
      - POSTGRES_DB=sbomhub
      - MIGRATOR_PASSWORD=${MIGRATOR_PASSWORD:-sbomhub_migrator_dev}
      - APP_PASSWORD=${APP_PASSWORD:-sbomhub_app_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbomhub"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
