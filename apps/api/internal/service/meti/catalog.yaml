    title_ja: 脆弱性に関する SBOM ツールの出力結果を踏まえ、深刻度の評価、影響度の評価、脆弱性の修正、残存リスクの確認、関係機関への情報提供等の脆弱性対応を行う
    verbatim_title_ja: 脆弱性に関する SBOM ツールの出力結果を踏まえ、深刻度の評価、影響度の評価、脆弱性の修正、残存リスクの確認、関係機関への情報提供等の脆弱性対応を行う
    evaluator_text_ja: 脆弱性に関する SBOM ツールの出力結果を踏まえ、深刻度の評価、影響度の評価、脆弱性の修正、残存リスクの確認、関係機関への情報提供等の脆弱性対応を行う
    title_en: Establish a vulnerability monitoring process
    description_ja: |
      脆弱性管理に当たっては、SBOM ツールの脆弱性管理機能の出力結果を踏まえ、ソフトウェアに含まれるコンポーネントの脆弱性有無を確認するとともに、脆弱性が確認された場合には、当該脆弱性に対する対応を実施することが必要となる。具体的な脆弱性対応として、脆弱性の箇所を特定し、影響範囲を分析するとともに、リスクの推定及び評価を行い、リスクの受容可能性を確認し、脆弱性対応の優先付けを行うことが望まれる。
    description_en: |
      Following Chapter 7 of the ver 2.0 guidance, establish steady-state
      operations (cadence, owner, SLA) that match each SBOM component
      against vulnerability databases.
    evaluator_hint: "Auto-signal: scan_settings.vuln_scan_enabled is true AND last scan_tracker entry is within configured cadence."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.1 脆弱性特定フェーズ / 第6章 6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施 (checklist No.1 脆弱性対応)"
