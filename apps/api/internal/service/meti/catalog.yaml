    M12-2 Methodology:
      1. M11-3 で導入した local PDF fixture (SBOMv2.pdf SHA256
         cd24eff4..., SBOMv2gaiyou.pdf SHA256 9d46a2f1...) を再利用。
         両 PDF は M10-2 (#75) で SHA256 検証済。
      2. IPA 二次資料を WebSearch で公式 URL を特定し WebFetch で取得
         (sbn8o10000001zcl.pdf, 2.9MB)。 pdftotext で 2,565 行抽出。
      3. M11-3 で distilled として残した 15 件について、 primary PDF
         に対応する section 見出し / □ 行 / body verbatim wording を
         再 audit。 10 件は primary PDF に anchoring sentence を発見、
         残り 5 件は IPA 二次資料の 表：N.N.N チェック項目を採用。
      4. catalog.go schema に VerbatimTitleJA / EvaluatorTextJA / Source
         3 field を追加 (yaml: verbatim_title_ja / evaluator_text_ja /
         source)。 catalog.yaml に 32 件全件で verbatim_title_ja +
         evaluator_text_ja を populate、 5 件で source: ipa-derived を
         付与。
      5. 既存 title_ja / description_ja / evaluator_hint / source_section
         は不変。 handler (meti.go) / evidence_pack (builder.go) / web
         frontend の consumer は title_ja を読み続けるため transparent
         backward compat。

    M12-2 で full 昇格できる根拠 (M11-3 partial 維持判断との差分):
      M11-3 では「distilled 15 件を強制 verbatim 化すると意味が崩れる
      (例: SBOMHub 実装の EPSS/SSVC 軸を 7.4.2 の multi-step 表現に
      押し込むと評価器 signal との対応が失われる)」 と判断し、 verbatim
      vs evaluator semantics の 1-field doubling 問題により partial を
      維持した。 M12-2 の schema 拡張により verbatim_title_ja と
      evaluator_text_ja を分離した結果、 distillation の意味を犠牲に
      せず公式 wording を audit grade で保持できるようになり、 full
      verification の前提条件を満たした。

