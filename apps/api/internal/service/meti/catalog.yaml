# METI SBOM Catalog
# (M3-3 #39 / M5-6 #52 / M8-1 #62 / M8-2 #63 / M10-2 #75 / M11-3 #78)
#
# Self-assessment criteria derived from "ソフトウェア管理に向けた SBOM
# (Software Bill of Materials) の導入に関する手引 ver 2.0" (経済産業省, 2024-08-29).
#
# M11-3 (issue #78, 2026-06-29): user の手元 local PDF fixture
# (/home/y1/Downloads/meti-sbom-v2/SBOMv2.pdf, SHA256
# cd24eff4e082286698f77253492b0eb07a515e3f70e9835ff8d3c1b276b7336a) を
# pdftotext 抽出し、 32 criteria のうち 17 件で title_ja / description_ja を
# primary PDF verbatim (checklist box の □ 行 + 本文の load-bearing 1-2 文)
# に書き換えた。 残り 15 件は primary PDF に直接対応する 1-line がない
# (IPA 二次資料由来 6 件 + SBOMHub 運用補強 distillation 9 件) ため、
# 引き続き curated distillation として保持し、 notes: で明示する。
#
# 結果:
#   * 17 件 VERBATIM (env_setup.02-09 の 8 件 + sbom_creation.02-05/07 の
#     5 件 + sbom_operation.01/02/05/07 の 4 件) — title_ja は primary PDF
#     の □ checklist 行 (または 4.2/4.4 については section 見出し) を
#     character-by-character で転載。 description_ja は同節の本文から
#     1-2 文を verbatim で抜粋。
#   * 15 件 DISTILLED (env_setup.01/10/11 + sbom_creation.01/06/08/09/10 +
#     sbom_operation.03/04/06/08/09/10/11) — primary PDF に独立 checklist
#     item がない、 または auto-evaluator signal (CI cadence / EOL /
#     IPA secondary catalogue 由来) が primary PDF の単一文に対応しない
#     ため、 distillation を維持。 各 notes: で M11-3 が distillation を
#     維持する根拠を明示。
#   * verification_status は 「partial」 を維持。 32 件中 17 件 verbatim、
#     15 件 distilled-with-notes。 「full」 主張は honest ではない。
#   * source_section は M10-2 で確立した primary-PDF anchor をそのまま
#     継承。 M11-3 は wording rewrite のみで、 anchor は再評価していない。
#
# M10-2 (issue #75, 2026-06-29): primary PDF を local fixture として
# 取得し、 全 32 criteria の source_section を primary PDF 実構造
# (4.1 / 4.2 / 4.3 / 4.4 / 5.1 / 5.2 / 5.3 / 6.1 / 6.2 / 7.x) に整合させた。
# M8-1 までの 「表：4.1.1 / 4.5.1 / 6.3.1」 等の表番号は IPA 二次資料
# (2024-12 版) の numbering であり primary PDF には存在しないため除去。
# title_ja / description_ja は当時 distillation のまま据え置き、 verbatim
# 化は M11-3 (本 wave) で実施。
#
# M8-1 (issue #62, 2026-06-28): 27 → 32 criteria に拡張。 IPA 中核人材育成
# プログラム「SBOM 導入・運用の手引き」 (2024-12 版、 経産省 ver 2.0 を
# [1] として明示参照) の 32-item チェックリストと 1:1 対応を達成。 追加 5 件:
# env_setup.09 (構成図可視化, primary 4.1 No.2 由来) / env_setup.10 (ツール
# 導入・設定 個別運用, primary 4.3) / env_setup.11 (ツール学習 運用習熟度,
# primary 4.4) / sbom_creation.10 (5.3 共有 個別運用 IPA 由来) /
# sbom_operation.11 (6.2 提供期間 個別運用 IPA 由来)。
#
# Source:
#   primary 本書:
#     https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2.pdf
#     (SHA256 cd24eff4e082286698f77253492b0eb07a515e3f70e9835ff8d3c1b276b7336a,
#      local fixture: /home/y1/Downloads/meti-sbom-v2/SBOMv2.pdf, 4.8 MB)
#   概要 PDF:
#     https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2gaiyou.pdf
#     (SHA256 9d46a2f16e4f075b18671b646c8ce0006e057211b041e5a26efa2942c83d0567,
#      local fixture: /home/y1/Downloads/meti-sbom-v2/SBOMv2gaiyou.pdf, 1.2 MB)
#   English version:
#     https://www.meti.go.jp/english/policy/safety_security/cybersecurity/downloadfiles/sbom_tebiki02_en.pdf
#     (M10-2 時点で取得未確認、 title_en / description_en は best-effort
#      translation、 M10-2 の verification 対象外)
#   press release:
#     https://www.meti.go.jp/press/2024/08/20240829001/20240829001.html
#   IPA 二次資料 (cited where catalog draws from this rather than primary PDF):
#     https://www.ipa.go.jp/jinzai/ics/core_human_resource/final_project/2024/sbn8o10000001y6j-att/sbn8o10000001zcl.pdf
#
# Primary PDF の実章節構造 (M10-2 で確認済):
#   4. 環境構築・体制整備フェーズ
#     4.1 SBOM 適用範囲の明確化   — 6 checklist items (No.1 開発言語等 /
#         No.2 構成図 / No.3 契約形態 / No.4 規制 / No.5 組織内制約 / No.6 5W1H)
#     4.2 SBOM ツールの選定
#     4.3 SBOM ツールの導入・設定
#     4.4 SBOM ツールに関する学習
#   5. SBOM 作成・共有フェーズ
#     5.1 コンポーネントの解析
#     5.2 SBOM の作成
#     5.3 SBOM の共有
#   6. SBOM 運用・管理フェーズ
#     6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施
#     6.2 SBOM 情報の管理
#   7. 脆弱性管理プロセスの具体化 (ver 2.0 新規)
#     7.1 目的 / 7.2 課題・問題認識 / 7.3 プロセス全体像
#     7.4 各フェーズの手順と方法
#       7.4.1 脆弱性特定フェーズ / 7.4.2 脆弱性対応優先付けフェーズ
#       7.4.3 情報共有フェーズ / 7.4.4 脆弱性対応フェーズ
#   付録 8 SBOM 対応モデル / 付録 9 SBOM 取引モデル
#
# Schema (one entry):
#   - id:               stable, dotted, lowercase. "meti.<phase>.<seq>".
#   - phase:            "env_setup" | "sbom_creation" | "sbom_operation"
#   - title_ja:         short Japanese title
#   - title_en:         short English title
#   - description_ja:   longer Japanese description (what to do, why)
#   - description_en:   longer English description (what to do, why)
#   - evaluator_hint:   English free-form pointer that the M3-2 evaluator
#                       agent uses to pick which DB table / setting / scan
#                       artefact to inspect. Keep it concrete enough that a
#                       grep over the codebase resolves to the relevant
#                       service (e.g. "scan_settings.enabled_scanners",
#                       "sboms table created_at frequency").
#   - source_section:   chapter / sub-section reference in the official
#                       METI guidance (Japanese, format "第N章 N.N 小見出し").
#                       Required from M5-6 — the loader rejects criteria
#                       without it so a future authoring round cannot
#                       silently lose provenance. M10-2 で primary PDF
#                       integer-numbered sections (4.1 等) に整合済。
#   - notes:            (optional, M10-2 introduced) Japanese annotation
#                       explaining where the catalog wording is a
#                       deliberate distillation of a multi-paragraph
#                       primary PDF section, or where the criterion is
#                       sourced from the IPA secondary catalogue rather
#                       than the primary METI ver 2.0 PDF.

