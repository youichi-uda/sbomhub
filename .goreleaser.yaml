# GoReleaser config — sbomhub OSS (M5-2 / #54).
#
# Scope: this config builds and publishes ONLY the `llm-bench` binary
# (apps/api/cmd/llm-bench). The `server` and `migrate` binaries continue
# to ship as Docker images via docker-publish.yml; only `llm-bench` needs
# a standalone artifact path because sbomhub-cli's `sbomhub llm bench`
# wrapper has to download a pre-built binary on the operator's host
# rather than `go run` against a mounted sbomhub OSS source tree (M4 F54
# option (c) → M5-2).
#
# Run locally:
#   goreleaser check                   # validate this file
#   goreleaser release --snapshot \    # dry run, no GitHub push
#       --clean --skip=publish
#
# CI invocation lives in .github/workflows/release.yml, triggered on tag
# push (`v*`). `GITHUB_TOKEN` is the only required secret.
#
# DO NOT add a build entry for `apps/api/cmd/server` or `apps/api/cmd/migrate`
# here. Those binaries are validated and shipped via Docker images
# (docker-publish.yml); duplicating them as raw archives risks drift in
# the runtime contract (config search paths, migration files alongside,
# etc.). M5-2 is intentionally narrowly scoped to llm-bench.

version: 2

# The Go module is rooted at apps/api/, so every `builds` entry uses
# dir: apps/api to give goreleaser the right module context. Going
# wider (running goreleaser at apps/api/) would split the release
# config away from the repo root and complicate the CI workflow.
project_name: sbomhub

# M10-4 #72: GitHub release assets cannot have filenames starting with a dot
# — goreleaser silently renames `.env.example` → `default.env.example` when
# uploading, but the SHA256SUMS entry still uses the source basename
# (`.env.example`), causing a name drift between the published asset and
# the checksum file. Pre-stage a non-dot copy (`default.env.example`) and
# reference THAT in checksum.extra_files / release.extra_files so both the
# uploaded asset name and the SHA256SUMS entry stay aligned.
before:
  hooks:
    - sh -c 'cp .env.example default.env.example'

builds:
  - id: llm-bench
    dir: apps/api
    main: ./cmd/llm-bench
    binary: llm-bench
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Windows + arm64 combination is technically valid for Go 1.22+ but
    # nobody runs `sbomhub llm bench` on Windows ARM in practice. Keep
    # it in the matrix; goreleaser will produce the archive cheaply and
    # we avoid a "why was this excluded" question later.
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

archives:
  - id: llm-bench
    ids:
      - llm-bench
    # Naming follows the M5-2 contract documented in the issue:
    #   llm-bench-v{VERSION}-{OS}-{ARCH}.{tar.gz|zip}
    # sbomhub-cli's wrapper resolves the download URL by reconstructing
    # this template from its embedded version constant — do not change
    # the layout without bumping the wrapper.
    name_template: "llm-bench-v{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      # Bundle the bench's canonical fixture so an operator running
      # `llm-bench --eval-set ./test/fixtures/llm-bench/cve-20-50.json`
      # from the archive root does not also need to clone sbomhub.
      # The wildcard scopes the inclusion to the bench fixtures only —
      # we deliberately do NOT bundle apps/api/test/fixtures/* wholesale
      # because the rest are server / migration test data unrelated to
      # the bench.
      - src: apps/api/test/fixtures/llm-bench/*
        dst: fixtures/llm-bench
        strip_parent: true

# M7 #57: publish SHA256SUMS for both llm-bench archives and the operational
# curl-only install artifacts. GoReleaser uploads checksum.extra_files entries
# by basename, matching install.sh verification.
#
# M10-4 #72: `default.env.example` here (instead of `.env.example`) keeps
# the SHA256SUMS entry aligned with the actual uploaded asset name (see
# `before.hooks` above). install.sh's verify_download_checksum() tries the
# new entry name first and falls back to the legacy `.env.example` entry
# so v1.6.0-or-older SHA256SUMS files keep working.
checksum:
  name_template: "SHA256SUMS"
  algorithm: sha256
  extra_files:
    - glob: install.sh
    - glob: docker-compose.yml
    - glob: default.env.example
    - glob: docker/scripts/backup.sh
    - glob: docker/scripts/restore.sh
    - glob: docker/scripts/_env_helpers.sh
    - glob: docker/scripts/dr-rehearsal.sh
    - glob: docker/scripts/verify-encryption.sh
    - glob: docker/scripts/verify-encryption-cron.sh

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

release:
  github:
    owner: youichi-uda
    name: sbomhub
  draft: false
  prerelease: auto
  name_template: "{{.Tag}}"
  # M10-4 #72: `default.env.example` (see `before.hooks` rationale at the
  # top of this file). Uploading this name directly avoids goreleaser's
  # silent dot-prefix rename and keeps the SHA256SUMS entry vs. asset name
  # in sync.
  extra_files:
    - glob: install.sh
    - glob: docker-compose.yml
    - glob: default.env.example
    - glob: docker/scripts/backup.sh
    - glob: docker/scripts/restore.sh
    - glob: docker/scripts/_env_helpers.sh
    - glob: docker/scripts/dr-rehearsal.sh
    - glob: docker/scripts/verify-encryption.sh
    - glob: docker/scripts/verify-encryption-cron.sh
  header: |
    ## sbomhub {{ .Tag }}

    This release includes the standalone `llm-bench` binary used by
    `sbomhub llm bench` (sbomhub-cli) to compare Managed AI vs Local LLM
    quality on the VEX-triage eval-set without requiring a sbomhub OSS
    source checkout.

    See [llm-bench README](./apps/api/cmd/llm-bench) for the env
    contract and exit-code table (F42).

    The sbomhub `server` / `migrate` runtime binaries are not in this
    archive — they continue to ship as Docker images (`y1uda/sbomhub-api`,
    `y1uda/sbomhub-web`) via the docker-publish workflow.
