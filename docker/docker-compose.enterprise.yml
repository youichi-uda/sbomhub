# SBOMHub Enterprise Self-host Compose
#
# OSS の docker-compose.yml は開発者向け (DB / Redis を host port に 15432 /
# 16379 で expose、 ENCRYPTION_KEY は dev placeholder)。 本 file は **製造業
# enterprise self-host** 向けに、 以下を上乗せ / 差し替える:
#
#   1. Local LLM (Ollama) を同梱、 localhost-only bind で外部公開しない。
#   2. ENCRYPTION_KEY / DB password を docker secrets 経由で渡す
#      (平文 .env / image レイヤーに残さない)。
#   3. backend / frontend の 2 ネットワーク分離 (postgres / redis / ollama /
#      api は backend、 web / api は frontend)。 ※要確認: backend network は
#      `internal: true` ではなく **container outbound egress あり**
#      (`internal: false`) で運用する。 理由は ollama-init が起動時に
#      `ollama pull` で model registry (registry.ollama.ai) へ container 内
#      から outbound 接続する必要があるため (= model pull は container egress
#      に依存する)。 なお Docker image pull (postgres / redis / ollama image
#      を registry.docker.io / ghcr 等から取得する処理) は **host 側 docker
#      daemon が独立して行う** ため、 container network 上の `internal:`
#      設定の影響を **受けない** (`internal: true` にしても image pull 自体は
#      成功する、 失敗するのは model pull のみ)。 ingress (外部からの到達) は
#      **host port を `127.0.0.1` localhost-only bind** することで遮断する
#      (下記 4. と同じ規律)。 outbound を厳格に絞りたい enterprise 環境では、
#      docker 内部 network ではなく host 側 firewall / egress proxy (Squid /
#      Cloudflare Gateway 等) で model hub (registry.ollama.ai) を制御する
#      ことを推奨する (image pull の制御は host daemon の HTTP(S) proxy /
#      firewall 側で registry.docker.io / ghcr.io を allowlist する)。 詳細な
#      network 分離方針は docs/security/self-host-deployment.md §7 参照。
#   4. host port は **localhost-only bind** をデフォルト
#      (`127.0.0.1:PORT:PORT`)。 公開はリバースプロキシ (Caddy / nginx /
#      Cloudflare Tunnel) で TLS 終端後に行う前提 (docs/security/
#      self-host-deployment.md §6 参照)。 これが ingress を遮断する一次防御
#      で、 上記 3. の backend network 分離は二次的な service-to-service
#      分離 (frontend 経由でしか web からは backend に到達できない)。
#
# 起動: 既存 OSS docker-compose.yml を override せず、 本 file を `-f` で
# 明示指定して単独使用する。
#
#     cd docker
#     cp -r secrets.example secrets
#     openssl rand -base64 32 > secrets/encryption_key.txt
#     openssl rand -base64 24 > secrets/postgres_password.txt
#     chmod 600 secrets/*
#     docker compose -f docker-compose.enterprise.yml up -d
#
# 初回 `ollama` pull は数 GB のダウンロード + 数十分要する。 進捗は
# `docker compose -f docker-compose.enterprise.yml logs -f ollama-init` で確認。
#
# 関連 issue: https://github.com/youichi-uda/sbomhub/issues/49 (M4-6)
# 関連 docs:  ../docs/security/self-host-deployment.md  (M4-4)

# ※要確認: compose top-level "version:" は v2 では deprecated (warning) なので
# 削除済み。 古い docker compose v1 でも parse できるが、 enterprise self-host
# の前提 (Docker Engine 24+ + Compose v2) ではこの形が推奨。

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL
  # ---------------------------------------------------------------------------
  # M4-4 docs §3 の RLS / DB role 分離は **default で有効** (M4 Codex review
  # #F76 fix)。 本 service は POSTGRES_USER=sbomhub を **bootstrap superuser**
  # 専用に保持し、 sbomhub-api 本体は下記 `db-bootstrap` one-shot service が
  # 起動時に冪等作成する `sbomhub_app` (NOSUPERUSER NOBYPASSRLS) /
  # `sbomhub_migrator` (NOBYPASSRLS) ロールで接続する。 これにより F72 の
  # RLS startup guard (`rolbypassrls || rolsuper` で hard-fail) を default 構成で
  # 通過し、 `docker compose -f docker-compose.enterprise.yml up -d` 一発で
  # production-ready な multi-tenant 分離が成立する。
  #
  # ※要確認: 旧構成 (sbomhub_app に切り替える前) の volume を持つ環境では、
  # db-bootstrap が legacy 所有 tables を sbomhub_migrator へ ALTER OWNER で
  # 移譲する DO block を含む (install.sh `--bootstrap-roles` と同等)。 manual
  # `install.sh --bootstrap-roles` 経路も **advanced operator 向けに維持**
  # しており、 db-bootstrap と install.sh は SQL pattern が同一で冪等なので
  # 重複実行しても問題ない (詳細: README.enterprise.md §3)。
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sbomhub
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: sbomhub
      # POSTGRES_INITDB_ARGS で encoding / locale を固定。 日本語 PSIRT 環境
      # で en_US.UTF-8 を確実に取るための保険 (postgres:15-alpine は UTF-8 が
      # default だが、 ベースイメージ更新時の drift を防ぐ意味で明示する)。
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # host への port 公開は不要 (compose internal network 経由でのみアクセス)。
    # 外部から psql で繋ぎたい場合は SSH local-forward を使うこと (M4-4 §7.1)。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sbomhub -d sbomhub"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Redis (cache / queue)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # Ollama (Local LLM)
  # ---------------------------------------------------------------------------
  # ※要確認: 2026-06 時点の Ollama stable tag は `ollama/ollama:latest`。
  # GPU 利用時 (NVIDIA) は `latest` で問題なく動く (image に CUDA libs を
  # 同梱、 host 側に NVIDIA Container Toolkit 必須)。 ROCm / AMD GPU 利用時は
  # `ollama/ollama:rocm` を選択する。 CPU-only でも動くが latency 10-30× 遅
  # ([self-host-deployment.md §11.2](../docs/security/self-host-deployment.md))。
  #
  # localhost-only bind (127.0.0.1:11434:11434) は **強制** 規律。 0.0.0.0
  # 公開すると第三者が prompt 投入して model を悪用するリスクがある
  # (self-host-deployment.md §7.2 参照)。 SBOMHub api コンテナからは
  # backend network 経由で `http://ollama:11434` でアクセスするので、 host
  # への bind は基本的に不要。 ただし host CLI / 別ツールから直接叩く
  # ユースケースがあるため localhost bind は残す (本当に不要なら ports:
  # ブロックごと削除可)。
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      # ollama serve のホスト側 health endpoint は GET / が "Ollama is running" を返す。
      # /api/tags は model 一覧 (空でも 200) なので、 init 前後どちらでも通る。
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - backend
    # ※要確認: GPU passthrough (NVIDIA) 利用時は以下を有効化する
    # (docker compose v2.3+ の `deploy.resources.reservations.devices` syntax)。
    # NVIDIA Container Toolkit が host 側に install 済みであること。
    # CPU-only / AMD ROCm 環境ではコメントアウトのままで OK。
    #
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all          # or 1 / 2 / ...
    #           capabilities: [gpu]

  # ---------------------------------------------------------------------------
  # ollama-init: 起動時に必要な model を一度だけ pull する one-shot service
  # ---------------------------------------------------------------------------
  # ollama-init は ollama service が healthy になってから model を pull し、
  # 完了したら exit 0 で終了する。 既に pull 済みの場合 `ollama pull` は
  # diff layer のみ確認するので no-op (数秒) で終わる。
  #
  # 別 entrypoint 化することで:
  #   - ollama 本体の health check が pull 時間に引きずられない
  #   - pull の進捗を `docker compose logs -f ollama-init` で個別に追える
  #
  # ※要確認: default model は `qwen2.5-coder:7b`。 M4-3 比較 bench で他 model
  # を採用したい場合、 `SBOMHUB_OLLAMA_MODEL` env を override する。 README.enterprise.md
  # §3 参照。
  ollama-init:
    image: ollama/ollama:latest
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      # OLLAMA_HOST は ollama CLI が ollama サーバへ接続するための env。
      # backend network 内の DNS 名 `ollama` を参照する。
      OLLAMA_HOST: "http://ollama:11434"
      SBOMHUB_OLLAMA_MODEL: "${SBOMHUB_OLLAMA_MODEL:-qwen2.5-coder:7b}"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        echo "[ollama-init] pulling model: $${SBOMHUB_OLLAMA_MODEL}"
        ollama pull "$${SBOMHUB_OLLAMA_MODEL}"
        echo "[ollama-init] model pull complete; current models:"
        ollama list
    networks:
      - backend

  # ---------------------------------------------------------------------------
  # db-bootstrap: 起動時に sbomhub_app / sbomhub_migrator ロールを冪等作成する one-shot service
  # ---------------------------------------------------------------------------
  # M4 Codex review #F76 fix: F72 fix (`apps/api/cmd/server/main.go`
  # `evaluateAppRoleRLS`) が production / staging で superuser を hard-fail
  # するように強化されたため、 official `postgres` image が POSTGRES_USER から
  # 作成する superuser (`sbomhub`) で sbomhub-api を直接接続する旧 default 構成
  # は startup guard で exit する。 本 service は postgres が healthy になった
  # 直後に bootstrap superuser として psql 接続し、 以下を冪等に投入する:
  #
  #   1. `sbomhub_migrator` (NOBYPASSRLS / CREATEDB / CREATEROLE / schema CREATE)
  #      および `sbomhub_app` (NOSUPERUSER / NOBYPASSRLS) ロールの CREATE
  #      (既存時は ALTER で password rotation + 属性を強制)。
  #   2. `GRANT CONNECT ON DATABASE` / `GRANT USAGE ON SCHEMA public`、
  #      migrator にのみ `GRANT CREATE ON SCHEMA public` (apps/api の
  #      auto-migration が schema_migrations を作るために必須)。
  #   3. `uuid-ossp` extension を superuser として CREATE
  #      (migration 001 が CREATE EXTENSION IF NOT EXISTS で呼ぶが
  #      migrator は database-level CREATE 権限を持たないため、 ここで先回り
  #      install して migration を no-op 化する)。
  #   4. 既存 tables / sequences への GRANT、 および migrator が今後 CREATE する
  #      object に対する ALTER DEFAULT PRIVILEGES (sbomhub_app へ SELECT /
  #      INSERT / UPDATE / DELETE + USAGE / SELECT on sequences を自動付与)。
  #   5. 旧構成 (sbomhub superuser が tables を所有していた) からの
  #      upgrade を想定した、 `public` schema 配下 application object の
  #      ALTER OWNER → sbomhub_migrator 移譲 (fresh install では no-op)。
  #
  # SQL は install.sh `--bootstrap-roles` (apply_role_bootstrap) と **同一規律**:
  # password は psql `-v migrator_password=... -v app_password=...` で受け、
  # SQL 本体は dollar-quoted body 外で `:'var'` (psql client-side literal quoting)
  # + `format(... %L ...)` (server-side literal quoting) の belt-and-suspenders。
  # password raw value は SQL string literal の中に直接出現しないため、 任意 byte
  # を含む password でも injection / 構文エラーにならない (codex-r8 P2 と同じ規律)。
  #
  # exit 0 で one-shot 終了。 既に role が存在し password も一致している場合は
  # SELECT ... WHERE NOT EXISTS / ALTER ROLE が no-op で数秒以内に完了する。
  # restart: "no" で再起動させない (compose up 後 `docker compose ps` に
  # `Exited (0)` として残るのが正常)。
  db-bootstrap:
    image: postgres:15-alpine
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - postgres_password
      - postgres_app_password
      - postgres_migrator_password
    environment:
      POSTGRES_HOST: "postgres"
      POSTGRES_ADMIN_USER: "sbomhub"
      POSTGRES_DB: "sbomhub"
      POSTGRES_ADMIN_PASSWORD_FILE: "/run/secrets/postgres_password"
      POSTGRES_APP_PASSWORD_FILE: "/run/secrets/postgres_app_password"
      POSTGRES_MIGRATOR_PASSWORD_FILE: "/run/secrets/postgres_migrator_password"
    networks:
      - backend
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        for f in "$$POSTGRES_ADMIN_PASSWORD_FILE" "$$POSTGRES_APP_PASSWORD_FILE" "$$POSTGRES_MIGRATOR_PASSWORD_FILE"; do
          if [ ! -r "$$f" ]; then
            echo "[db-bootstrap] FATAL: required secret file not readable: $$f" >&2
            exit 1
          fi
        done
        PGPASSWORD="$$(cat "$$POSTGRES_ADMIN_PASSWORD_FILE")"
        export PGPASSWORD
        APP_PW="$$(cat "$$POSTGRES_APP_PASSWORD_FILE")"
        MIG_PW="$$(cat "$$POSTGRES_MIGRATOR_PASSWORD_FILE")"
        echo "[db-bootstrap] applying sbomhub_app / sbomhub_migrator role bootstrap (idempotent)"
        # PSQL_*_PASSWORD env を経由して psql -v に渡す。 SQL 本体は quoted
        # heredoc (<<'SQL') にして shell 展開を完全に抑止 (= raw password 値が
        # SQL literal に直接出現する経路を絶つ)。
        PSQL_MIGRATOR_PASSWORD="$$MIG_PW" \
        PSQL_APP_PASSWORD="$$APP_PW" \
        psql -v ON_ERROR_STOP=1 \
             -v migrator_password="$$MIG_PW" \
             -v app_password="$$APP_PW" \
             -h "$$POSTGRES_HOST" -U "$$POSTGRES_ADMIN_USER" -d "$$POSTGRES_DB" \
             -X -q -f - <<'SQL'
        -- Create migrator role (DDL / migrations). NOT BYPASSRLS.
        SELECT format(
            'CREATE ROLE sbomhub_migrator WITH LOGIN PASSWORD %L CREATEDB CREATEROLE',
            :'migrator_password'
        )
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sbomhub_migrator')
        \gexec

        -- Create app role (runtime). NOSUPERUSER NOBYPASSRLS so RLS is enforced.
        SELECT format(
            'CREATE ROLE sbomhub_app WITH LOGIN PASSWORD %L NOSUPERUSER NOBYPASSRLS',
            :'app_password'
        )
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sbomhub_app')
        \gexec

        -- Idempotent password rotation + NOBYPASSRLS / NOSUPERUSER assertion.
        ALTER ROLE sbomhub_migrator WITH PASSWORD :'migrator_password' NOBYPASSRLS;
        ALTER ROLE sbomhub_app      WITH PASSWORD :'app_password'      NOSUPERUSER NOBYPASSRLS;

        -- Connect / schema usage.
        GRANT CONNECT ON DATABASE sbomhub TO sbomhub_migrator, sbomhub_app;
        GRANT USAGE   ON SCHEMA   public  TO sbomhub_migrator, sbomhub_app;

        -- Postgres 15+ revoked implicit CREATE on public schema for non-owners.
        -- sbomhub_migrator needs it to create schema_migrations and run DDL.
        -- sbomhub_app intentionally does NOT receive CREATE.
        GRANT CREATE ON SCHEMA public TO sbomhub_migrator;

        -- Install required extensions as bootstrap superuser (sbomhub_migrator
        -- lacks database-level CREATE, so migration 001's
        -- `CREATE EXTENSION IF NOT EXISTS "uuid-ossp"` would fail without this).
        CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

        -- Existing tables / sequences (no-op on fresh DB).
        GRANT ALL ON ALL TABLES IN SCHEMA public TO sbomhub_migrator;
        GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO sbomhub_app;
        GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO sbomhub_migrator, sbomhub_app;

        -- Future tables created by sbomhub_migrator inherit grants for sbomhub_app.
        ALTER DEFAULT PRIVILEGES FOR ROLE sbomhub_migrator IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO sbomhub_app;
        ALTER DEFAULT PRIVILEGES FOR ROLE sbomhub_migrator IN SCHEMA public
            GRANT USAGE, SELECT ON SEQUENCES TO sbomhub_app;

        -- Legacy upgrade: pre-F76 enterprise compose ran apps/api as the
        -- `sbomhub` superuser, so all tables / sequences / views on that volume
        -- are owned by `sbomhub`. Transfer ownership to sbomhub_migrator so
        -- migrations can ALTER / DROP them. Fresh installs see zero rows and
        -- the block is a no-op. We deliberately scope to `public` schema only
        -- and avoid REASSIGN OWNED BY (it would fail on the DB-owning bootstrap
        -- role with "cannot reassign ownership ... required by the database
        -- system").
        DO $$
        DECLARE
            obj record;
        BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'sbomhub') THEN
                RETURN;
            END IF;

            FOR obj IN
                SELECT schemaname, tablename
                FROM pg_tables
                WHERE schemaname = 'public' AND tableowner = 'sbomhub'
            LOOP
                EXECUTE format('ALTER TABLE %I.%I OWNER TO sbomhub_migrator',
                    obj.schemaname, obj.tablename);
            END LOOP;

            FOR obj IN
                SELECT n.nspname AS schemaname, c.relname AS objname
                FROM pg_class c
                JOIN pg_namespace n ON n.oid = c.relnamespace
                JOIN pg_roles r ON r.oid = c.relowner
                WHERE c.relkind = 'S'
                  AND n.nspname = 'public'
                  AND r.rolname = 'sbomhub'
            LOOP
                EXECUTE format('ALTER SEQUENCE %I.%I OWNER TO sbomhub_migrator',
                    obj.schemaname, obj.objname);
            END LOOP;

            FOR obj IN
                SELECT n.nspname AS schemaname, c.relname AS objname
                FROM pg_class c
                JOIN pg_namespace n ON n.oid = c.relnamespace
                JOIN pg_roles r ON r.oid = c.relowner
                WHERE c.relkind = 'v'
                  AND n.nspname = 'public'
                  AND r.rolname = 'sbomhub'
            LOOP
                EXECUTE format('ALTER VIEW %I.%I OWNER TO sbomhub_migrator',
                    obj.schemaname, obj.objname);
            END LOOP;

            FOR obj IN
                SELECT n.nspname AS schemaname, c.relname AS objname
                FROM pg_class c
                JOIN pg_namespace n ON n.oid = c.relnamespace
                JOIN pg_roles r ON r.oid = c.relowner
                WHERE c.relkind = 'm'
                  AND n.nspname = 'public'
                  AND r.rolname = 'sbomhub'
            LOOP
                EXECUTE format('ALTER MATERIALIZED VIEW %I.%I OWNER TO sbomhub_migrator',
                    obj.schemaname, obj.objname);
            END LOOP;
        END
        $$;
        SQL
        # 平文 password を環境変数 / log に残さない (server プロセスへの leak 防止)。
        unset PGPASSWORD APP_PW MIG_PW PSQL_MIGRATOR_PASSWORD PSQL_APP_PASSWORD
        echo "[db-bootstrap] role bootstrap complete; sbomhub-api can now start as sbomhub_app"

  # ---------------------------------------------------------------------------
  # SBOMHub API (Go / Echo)
  # ---------------------------------------------------------------------------
  # secrets pattern: docker secrets は /run/secrets/<name> に file mount される。
  # apps/api 本体は ENCRYPTION_KEY / DATABASE_URL を env var で読むため、
  # entrypoint wrapper で *_FILE → env var に変換する。
  # ※要確認: apps/api 自体に *_FILE envelope を直接サポートする PR を別 issue で
  # 出すと wrapper script を消せる (M4-4 docs §5.2 TODO 参照)。
  sbomhub-api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
      # M4 Codex review #F76: db-bootstrap が sbomhub_app / sbomhub_migrator
      # ロールを冪等作成してから sbomhub-api を起動する。 これにより F72 の
      # RLS startup guard (production で superuser を hard-fail) が default
      # 構成で通過する。
      db-bootstrap:
        condition: service_completed_successfully
    secrets:
      - encryption_key
      - postgres_app_password
      - postgres_migrator_password
    environment:
      APP_ENV: "production"
      PORT: "8080"
      # DB 接続情報は wrapper script で組み立てる (password を secret から
      # 差し込むため)。 wrapper script に渡す host / db / user は env で受ける。
      #
      # M4 Codex review #F76 fix: default で sbomhub_app (NOSUPERUSER
      # NOBYPASSRLS) / sbomhub_migrator (NOBYPASSRLS) ロール分離 + 別 secret に
      # 切り替え、 production / staging での F72 RLS startup guard を default
      # 構成で通過させる。 旧構成 (sbomhub superuser 単一ロール) は廃止。
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_DB: "sbomhub"
      POSTGRES_APP_USER: "sbomhub_app"
      POSTGRES_MIGRATOR_USER: "sbomhub_migrator"
      POSTGRES_APP_PASSWORD_FILE: "/run/secrets/postgres_app_password"
      POSTGRES_MIGRATOR_PASSWORD_FILE: "/run/secrets/postgres_migrator_password"
      REDIS_URL: "redis://redis:6379"
      ENCRYPTION_KEY_FILE: "/run/secrets/encryption_key"
      # LLM provider 設定: Local LLM (Ollama) を default として配線する。
      # 外部 API key を別 provider に切り替える場合は SBOMHUB_LLM_PROVIDER を
      # openai / anthropic / gemini / azure_openai に変え、 SBOMHUB_LLM_API_KEY
      # を secret 経由で渡す形に拡張する (README.enterprise.md §4)。
      SBOMHUB_LLM_PROVIDER: "ollama"
      SBOMHUB_LLM_OLLAMA_URL: "http://ollama:11434"
      SBOMHUB_LLM_MODEL: "${SBOMHUB_OLLAMA_MODEL:-qwen2.5-coder:7b}"
      # 監査ログ retention 設定 (M4-4 docs §8 参照)。
      SBOMHUB_LLM_AUDIT_STORE_RESPONSE: "false"
    ports:
      # host への bind は localhost-only。 外部公開はリバースプロキシで
      # TLS 終端後に行う (M4-4 docs §6)。
      - "127.0.0.1:8080:8080"
    networks:
      - backend
      - frontend
    # entrypoint wrapper: secrets file を env var に展開してから本体 server を exec。
    # 本体 image (apps/api/Dockerfile) は `./server` を CMD としているが、
    # wrapper script を image に焼くと OSS Dockerfile を弄ることになるので
    # ここでは inline sh -c で対応する (image 改変なし、 compose file 単独で完結)。
    # ※要確認: M4-4 docs §5.2 TODO で本体に *_FILE envelope を入れれば wrapper 削減可。
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        # secrets file が存在しない場合は明示的に fail する (silently fall back
        # to dev defaults はセキュリティ事故のもと、 F1-F37 §1.K secrets-never-log
        # 規律相当)。
        for f in "$$ENCRYPTION_KEY_FILE" "$$POSTGRES_APP_PASSWORD_FILE" "$$POSTGRES_MIGRATOR_PASSWORD_FILE"; do
          if [ ! -r "$$f" ]; then
            echo "[sbomhub-api entrypoint] FATAL: required secret file not readable: $$f" >&2
            exit 1
          fi
        done
        ENCRYPTION_KEY="$$(cat "$$ENCRYPTION_KEY_FILE")"
        export ENCRYPTION_KEY
        PG_APP_PW="$$(cat "$$POSTGRES_APP_PASSWORD_FILE")"
        PG_MIG_PW="$$(cat "$$POSTGRES_MIGRATOR_PASSWORD_FILE")"
        # url-encode (man-in-the-middle attack ではなく、 password に @ / : / + が
        # 含まれていた場合の URL parse 事故防止)。 sh で簡易 encode:
        # ※要確認: 完全な URL escape ではない (printable ASCII の特殊文字のみ)、
        # base64 password 想定 (alnum + `+ / =`) では十分。
        urlenc() {
          printf '%s' "$$1" | sed -e 's/+/%2B/g' -e 's|/|%2F|g' -e 's/=/%3D/g' -e 's/@/%40/g' -e 's/:/%3A/g' -e 's/?/%3F/g' -e 's/#/%23/g' -e 's/&/%26/g'
        }
        PG_APP_PW_ENC="$$(urlenc "$$PG_APP_PW")"
        PG_MIG_PW_ENC="$$(urlenc "$$PG_MIG_PW")"
        export DATABASE_URL="postgres://$$POSTGRES_APP_USER:$$PG_APP_PW_ENC@$$POSTGRES_HOST:$$POSTGRES_PORT/$$POSTGRES_DB?sslmode=disable"
        export MIGRATE_DATABASE_URL="postgres://$$POSTGRES_MIGRATOR_USER:$$PG_MIG_PW_ENC@$$POSTGRES_HOST:$$POSTGRES_PORT/$$POSTGRES_DB?sslmode=disable"
        # 平文 password を env / log に残さないように unset (server プロセスには
        # 渡さない)。
        unset PG_APP_PW PG_MIG_PW PG_APP_PW_ENC PG_MIG_PW_ENC
        echo "[sbomhub-api entrypoint] secrets loaded; starting server"
        exec /app/server

  # ---------------------------------------------------------------------------
  # SBOMHub Web (Next.js)
  # ---------------------------------------------------------------------------
  sbomhub-web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        # production では reverse proxy 経由で `https://api.example.com` を
        # 指定する想定。 開発 / PoC 用 default は host の localhost:8080。
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8080}"
    restart: unless-stopped
    depends_on:
      sbomhub-api:
        condition: service_started
    ports:
      - "127.0.0.1:3000:3000"
    networks:
      - frontend

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
# backend:  postgres / redis / ollama / api を載せる service-to-service network。
#           ※要確認: `internal: false` (container outbound egress あり)。
#           これは ollama-init container が `ollama pull` で
#           registry.ollama.ai に container 内から outbound 接続する必要が
#           あるため (= model pull は container egress に依存する)。
#           なお Docker image pull (postgres / redis / ollama image を
#           registry.docker.io / ghcr 等から取得する処理) は **host 側
#           docker daemon が独立して行う** ため、 ここでの `internal:` 設定の
#           影響は **受けない** (`internal: true` にしても image pull 自体は
#           成功し、 失敗するのは model pull のみ)。
#           外部からの ingress (untrusted client が直接 backend service に到達
#           すること) は **host port を `127.0.0.1` localhost-only bind** する
#           ことで遮断する (上記 services 各 ports: ブロック参照)。
#           より厳格な outbound 制御を求める enterprise 環境では、 docker
#           内部の `internal: true` ではなく **host 側 firewall (iptables /
#           nftables) や egress proxy (Squid / Cloudflare Gateway)** で
#           model hub (registry.ollama.ai) を allow する形を推奨する
#           (image pull の制御は host daemon の HTTP(S) proxy / firewall 側で
#           registry.docker.io / ghcr.io を allowlist する)。 運用詳細は
#           docs/security/self-host-deployment.md §7 参照。
#           なお `internal: true` に切り替えると model pull が失敗するため
#           (image pull は host daemon が行うので影響なし、 失敗するのは
#           container 内から registry.ollama.ai への到達のみ)、 切り替えるなら
#           ollama-init だけ別 egress network に attach する等の追加 surgery
#           が必要、 本 default では行わない。
# frontend: api / web を載せる ingress-facing network。 reverse proxy
#           (Caddy / nginx / Cloudflare Tunnel) はこちらに接続して TLS 終端する。
networks:
  backend:
    driver: bridge
    internal: false
  frontend:
    driver: bridge

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
# postgres_data / redis_data / ollama_data は named volume として永続化。
# backup.sh が pg_dump で吸い出すのは postgres_data の中身。 ollama_data
# (model file、 数〜数十 GB) は backup 対象外 (再 pull 可能なので)。
volumes:
  postgres_data:
  redis_data:
  ollama_data:

# -----------------------------------------------------------------------------
# Secrets
# -----------------------------------------------------------------------------
# ※要確認: docker compose の secrets は swarm mode と standalone で挙動が
# 異なる。 standalone (`docker compose up`) では file: source を tmpfs マウント
# として container 内 /run/secrets/<name> に出すだけで、 image レイヤーには
# 残らない。 swarm mode と異なり TTL / rotation の管理機能はないため、
# rotation 時は `docker compose up -d --force-recreate sbomhub-api` で
# 再起動する必要がある (M4-4 docs §4.4 鍵 rotation ranbook を踏襲)。
secrets:
  encryption_key:
    file: ./secrets/encryption_key.txt
  # postgres_password: POSTGRES_USER=sbomhub (bootstrap superuser) の password。
  # postgres service の initdb / db-bootstrap の psql admin 接続のみで使われ、
  # sbomhub-api 本体は触らない (M4 Codex review #F76 fix 以降、 API 接続は
  # postgres_app_password / postgres_migrator_password を使用)。
  postgres_password:
    file: ./secrets/postgres_password.txt
  # postgres_app_password: sbomhub-api runtime 接続 (sbomhub_app ロール、
  # NOSUPERUSER NOBYPASSRLS) の password。 M4 Codex review #F76 で default 化。
  postgres_app_password:
    file: ./secrets/postgres_app_password.txt
  # postgres_migrator_password: 自動 migration 接続 (sbomhub_migrator ロール、
  # NOBYPASSRLS + schema CREATE 権限) の password。 M4 Codex review #F76 で default 化。
  postgres_migrator_password:
    file: ./secrets/postgres_migrator_password.txt
