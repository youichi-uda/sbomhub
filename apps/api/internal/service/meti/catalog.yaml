      ソフトウェアへの含有確認 / ③外部ソースとの比較 / ④含まれる
      コンポーネントの出力含有確認 / ⑤スニペット解析でのソースコード
      比較 / ⑥ Copyright 抽出突合) に対応。 catalog 表現「package-lock /
      go.sum 等と突き合わせ」 は primary の「パッケージマネージャーで
