    M11-3 の判断: 32 件中 17 件で primary PDF verbatim を達成。 残り
    15 件は honest distillation として保持し、 notes: で各々の根拠を
    明示。 verification_status は 「partial」 を維持 — 「full」 を主張
    するには 32/32 verbatim が必要で、 distilled 15 件を強制 verbatim 化
    すると意味が崩れる (例: SBOMHub 実装の EPSS/SSVC 軸を 7.4.2 の
    multi-step 表現に押し込むと評価器 signal との対応が失われる)。

    M10-2 vs M11-3 の責務分離:
      * M10-2 (issue #75): source_section anchor を primary PDF の章節
        構造 (4.1 / 4.2 / 4.3 / 4.4 / 5.1 / 5.2 / 5.3 / 6.1 / 6.2 / 7.x)
        に整合 — 32/32 完了。 wording rewrite は M11-3 持ち越し。
      * M11-3 (issue #78): title_ja / description_ja を primary PDF
        verbatim に書き換え — 17/32 完了。 残 15 件は明示的に distilled
        として保持。 source_section anchor は変更せず継承。

    UI display 影響:
      verbatim title_ja は長くなる (最長 ~75 chars、 例 sbom_operation.01)
      ため、 list view (METI dashboard accordion / CriterionCard) では
      truncation + tooltip で full text を表示。 backend JSON / detail
      view は full text を serve。

    English version (sbom_tebiki02_en.pdf) は引き続き取得未確認。
    title_en / description_en は best-effort translation のまま、 M11-3
    の verbatim 対象外 (将来 wave に持ち越し)。

    過去 wave の経緯 (アーカイブ):
      M5-6 (issue #52, 2026-06-27): primary PDF への WebFetch / curl 全
      timeout。 IPA 二次資料を反映した初期 27 criteria を整備。
      M8-1 (issue #62, 2026-06-28): IPA 32-item 全項目との 1:1 対応を
      達成 (+5 criteria)。 wording exact-match は M8-2 持ち越し。
      M8-2 (issue #63, 2026-06-28): WebFetch 再試行、 meti.go.jp 全面
      遮断が継続することを確認。 catalog_test.go の title_ja exact-match
      regression を 32 件全件に拡張。 primary PDF 照合は user 環境
      offline 取得を待つ持ち越し。
      M10-2 (issue #75, 2026-06-29): user が offline で取得した primary
      / 概要 PDF を fixture とし、 全 source_section を primary 整合に
      書き換え。 wording distillation を notes: フィールドで明文化。
      M11-3 (issue #78, 2026-06-29): title_ja / description_ja を primary
      PDF verbatim に書き換え (17/32)、 残 15 件は honest distillation
      として保持。 UI 側で truncation + tooltip を追加。
      M12-2 (issue #83, 2026-06-30): catalog schema を option A 拡張
      (verbatim_title_ja + evaluator_text_ja 分離 + source: ipa-derived)、
      32 件全件で verbatim_title_ja を populate (primary METI ver 2.0
      PDF 27 件 + IPA 二次資料 5 件)、 verification_status を partial →
      full に昇格。 title_ja の backward compat は維持。

criteria:
  # --------------------------------------------------------------------------
  # Phase 1 — 環境構築・体制整備フェーズ (env_setup) : 11 items
  #   (M3-3 で 8 items / M8-1 で +3: 4.1.4 構成図可視化 / 4.4 ツール導入設定 /
  #    4.5 ツール学習)
  # --------------------------------------------------------------------------
  - id: meti.env_setup.01
    phase: env_setup
    source: ipa-derived
    title_ja: SBOM 担当部署および責任者を明確化
    verbatim_title_ja: 自組織における SBOM 導入・運用に係る役割と部門を精査する
    evaluator_text_ja: SBOM 担当部署および責任者を明確化
    title_en: Designate the SBOM owner team and accountable role
    description_ja: |
      SBOM 導入・運用の責任者と担当部署を明確化し、 経営層・開発・セキュリティ部門との
      役割分担を文書化する。 兼任を可とするが、 SBOM の最終承認者 (例: PSIRT 長)
      を 1 名固定し、 連絡窓口を明示する。
    description_en: |
      Identify the team and accountable individual responsible for SBOM
      adoption and operation, and document the division of responsibilities
      between leadership, engineering and security. A single final approver
      (e.g. PSIRT lead) and a contact point must be designated even when
      the role is shared with another function.
    evaluator_hint: "Manual-only. No auto-signal in DB. Map to checklist_responses table check_id='setup_01' for human attestation."
    source_section: "第4章 環境構築・体制整備フェーズ — 章導入文 (体制整備の必要性) + 4.1 SBOM 適用範囲の明確化 (組織内の制約 — 体制の制約) + 6.2 SBOM 情報の管理 (PSIRT / 品質管理部門による管理体制)"
    notes: |
      M11-3 DISTILLED: primary PDF に「SBOM 担当部署および責任者を
      明確化」 と直接対応する独立 □ checklist 行は存在しないため、
      verbatim 化せず curated distillation として保持。 出自は IPA 二次
      資料 「SBOM 導入・運用の手引き」 (2024-12 版) 表：4.2.1 No.1-2。
      primary PDF では (1) 第4章 章導入文 「SBOM に関する体制を整備
      することが必要」 (L.2486-2489) (2) 4.1 No.5 「組織内の制約
      （体制の制約、コストの制約等）」 (L.2498) (3) 6.2 SBOM 情報の管理
      「SBOM の管理体制について、脆弱性管理という観点を踏まえると、
      組織内の PSIRT 又はそれに類する部門が主導して SBOM の管理を
      行うのが望ましい」 (L.3758-3766) と分散的に言及。 catalog は
      IPA 二次資料に従って独立 checklist 化、 verification_status:
      partial の distilled-15 件側。

  - id: meti.env_setup.02
    phase: env_setup
    title_ja: 対象ソフトウェアの開発言語、コンポーネント形態、開発ツール等、対象ソフトウェアに関する情報を明確化する
    verbatim_title_ja: 対象ソフトウェアの開発言語、コンポーネント形態、開発ツール等、対象ソフトウェアに関する情報を明確化する
    evaluator_text_ja: 対象ソフトウェアの開発言語、コンポーネント形態、開発ツール等、対象ソフトウェアに関する情報を明確化する
    title_en: Inventory the target software's languages and build environment
    description_ja: |
      SBOM 導入組織は、SBOM 導入により解決したい自社の課題と SBOM 導入の目的を踏まえ、SBOM の適用範囲を明確化する必要がある。SBOM ツールを用いて SBOM を作成する場合、ツールによって対応している言語やコンポーネント形態が異なるため、開発言語とコンポーネントの形態については最低限把握することが必要である。
    description_en: |
      Inventory the languages, build tools (Maven / Gradle / npm / pip / Go
      modules, etc.) and container / OS-package layers used by the target
      software, and decide which scanner (Syft / Trivy / cdxgen) covers each
      stack so that no ecosystem is silently omitted from SBOM generation.
    evaluator_hint: "Auto-signal: sboms.bom_format and components.purl prefixes — distinct PURL types observed across all sboms for the project indicate ecosystems covered. Map to projects.metadata for declared stack vs. coverage gap."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.1 開発言語・コンポーネント形態・開発ツール等)"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.1 checklist No.1 □ 行
      「対象ソフトウェアの開発言語、コンポーネント形態、開発ツール等、
      対象ソフトウェアに関する情報を明確化する。」 (L.2493-2494) を
      末尾句点を除き byte-exact 転載。 description_ja は同節本文の 2 文
      (L.2512-2514 「SBOM 導入組織は…必要がある。」 + L.2690-2691
      「SBOM ツールを用いて…必要である。」) を verbatim 結合。
      M10-2 までは「開発言語・ビルド環境を整理」 を 1-line distillation
      として表示していたが、 M11-3 で primary PDF wording へ揃えた。

  - id: meti.env_setup.03
    phase: env_setup
    title_ja: 対象ソフトウェアの利用者及びサプライヤーとの契約形態・取引慣行を明確化する
    verbatim_title_ja: 対象ソフトウェアの利用者及びサプライヤーとの契約形態・取引慣行を明確化する
    evaluator_text_ja: 対象ソフトウェアの利用者及びサプライヤーとの契約形態・取引慣行を明確化する
    title_en: Clarify contract and trading practices with suppliers / OSS distributors
    description_ja: |
      あわせて、SBOM の対象とするコンポーネントの範囲対象を明確化するために、対象ソフトウェアの利用者及びサプライヤーとの契約形態・取引慣行を整理することが望まれる。具体的には、利用者・サプライヤーそれぞれについて、契約形態、コンポーネント情報の提供、第三者コンポーネントの申告、脆弱性の通知、脆弱性の修正、納品形態、損害賠償責任、知的財産権の帰属、改変の有無 等の各項目に関する対象ソフトウェアの情報を整理することが望まれる。
    description_en: |
      Review procurement contracts, OSS licences, SBOM-delivery obligations
      and vulnerability-disclosure SLAs, and codify in contract clauses the
      channel and cadence by which SBOMs are received from suppliers, plus
      the handling policy (re-distribution rights, retention period).
    evaluator_hint: "Manual-only. No DB signal. Map to checklist_responses check_id='setup_03'. Future hook: supplier_contracts table when added."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.3 利用者及びサプライヤーとの契約形態・取引慣行) / 付録 9 SBOM 取引モデル (ver 2.0 新規)"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.1 checklist No.3 □ 行
      「対象ソフトウェアの利用者及びサプライヤーとの契約形態・取引慣行を
      明確化する。」 (L.2496) を末尾句点を除き byte-exact 転載。
      description_ja は同節本文 (L.2798-2838) を 1 文に集約し、 9 項目を
      verbatim 列挙 (契約形態 / コンポーネント情報の提供 / 第三者
      コンポーネントの申告 / 脆弱性の通知 / 脆弱性の修正 / 納品形態 /
      損害賠償責任 / 知的財産権の帰属 / 改変の有無)。 M10-2 までの
      catalog 「サプライヤー / OSS 配布元」 は primary 文言「利用者及び
      サプライヤー」 に書き戻した。 付録 9 SBOM 取引モデル (L.10700+)
      は ver 2.0 新規補助参照。

  - id: meti.env_setup.04
    phase: env_setup
    title_ja: 対象ソフトウェアの SBOM に関する規制・要求事項を確認する
    verbatim_title_ja: 対象ソフトウェアの SBOM に関する規制・要求事項を確認する
    evaluator_text_ja: 対象ソフトウェアの SBOM に関する規制・要求事項を確認する
    title_en: Confirm applicable regulations and requirements
    description_ja: |
      SBOM 適用項目のうち、SBOM のフォーマット・項目や SBOM の活用範囲を決定するために、対象ソフトウェアの SBOM に関する規制・要求事項を確認し、整理することが望まれる。規制・要求事項において、SBOM のフォーマット・項目や SBOM の活用範囲が規定される可能性もあるため、対象ソフトウェアに関する規制・要求事項について随時情報収集し、求められる場合には具体的な要求事項を整理することが望まれる。
    description_en: |
      Inventory the regulations and standards that apply to your product's
      shipping geography and industry (EU CRA, US EO 14028, NIST SP 800-218,
      IPA procurement guidelines, etc.) and reflect SBOM-format, minimum-
      element and submission-deadline requirements in the design.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_04'. Future hook: cra_reports presence indicates EU CRA scope is in play."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.4 SBOM に関する規制・要求事項)"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.1 checklist No.4 □ 行
      「対象ソフトウェアの SBOM に関する規制・要求事項を確認する。」
      (L.2497) を末尾句点を除き byte-exact 転載。 description_ja は同節
      本文 (L.2840-2854) から先頭 1 文と末尾 1 文を verbatim 結合。
      M10-2 までの catalog (EU CRA / 米国 EO 14028 / NIST SP 800-218 /
      IPA 政府調達基準 等) は primary PDF が例示する M-22-18 / EU CRA /
      IMDRF / 薬機法に対する SBOMHub 側拡張で、 M11-3 で primary 文言へ
      戻した (具体的規制名は evaluator_hint 側で保持)。

  - id: meti.env_setup.05
    phase: env_setup
    title_ja: SBOM 導入に関する組織内の制約（体制の制約、コストの制約等）を明確化する
    verbatim_title_ja: SBOM 導入に関する組織内の制約（体制の制約、コストの制約等）を明確化する
    evaluator_text_ja: SBOM 導入に関する組織内の制約（体制の制約、コストの制約等）を明確化する
    title_en: Clarify organisational constraints (confidentiality, disclosure scope)
    description_ja: |
      SBOM 適用項目の検討に当たっては、当然ながら、SBOM 導入に向けた組織内の制約も加味する必要がある。最も想定される制約としては、組織内の体制に関する制約やコストに関する制約が挙げられる。これらの制約が厳しい場合、限定的な SBOM 適用項目しか選択できない可能性もあるところ、SBOM 適用範囲の整理のために、予め組織内の制約を確認・整理することが望まれる。
    description_en: |
      Define confidentiality classifications for internal dependencies and
      proprietary libraries that may appear in an SBOM, decide the disclosure
      scope toward customers and third parties, and establish a policy for
      separating public from internal SBOM variants.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_05'. Future hook: public_links.is_public flag history per project."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.5 SBOM 導入に関する組織内の制約)"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.1 checklist No.5 □ 行
      「SBOM 導入に関する組織内の制約（体制の制約、コストの制約等）を
      明確化する。」 (L.2498) を末尾句点を除き byte-exact 転載 (zenkaku
      括弧含む)。 description_ja は同節本文 (L.2855-2858) を verbatim
      連結。 M10-2 までの catalog 「機密情報の取り扱い / 公開範囲」 は
      SBOM 公開可否を含意する SBOMHub 拡張で、 M11-3 で primary 文言
      「体制の制約、コストの制約等」 に書き戻した。

  - id: meti.env_setup.06
    phase: env_setup
    title_ja: 整理した情報に基づき、SBOM 適用範囲（5W1H）を明確化する
    verbatim_title_ja: 整理した情報に基づき、SBOM 適用範囲（5W1H）を明確化する
    evaluator_text_ja: 整理した情報に基づき、SBOM 適用範囲（5W1H）を明確化する
    title_en: Define the SBOM application scope (5W1H)
    description_ja: |
      SBOM 導入組織は、SBOM 導入により解決したい自社の課題と SBOM 導入の目的を踏まえ、SBOM の適用範囲を明確化する必要がある。SBOM 適用範囲は表 4-1 に示す 5W1H の観点に分類することができ、各観点において複数の適用項目（選択肢）が存在する。
    description_en: |
      Document who creates and consumes the SBOM, when it is produced
      (release / scheduled / per-CI), where it covers (production / staging /
      internal), what targets and modules are in scope, why it is required
      (regulation / customer / internal audit) and how it is handled
      (automated vs. manual).
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_06'. Auto-augment: count of distinct project ids vs. scan_settings rows indicates whether scope is consistently configured."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.6 SBOM 適用範囲 (5W1H) / 表 4-1 SBOM 適用範囲 (5W1H))"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.1 checklist No.6 □ 行
      「整理した情報に基づき、SBOM 適用範囲（5W1H）を明確化する。」
      (L.2499) を末尾句点を除き byte-exact 転載 (zenkaku 括弧含む)。
      description_ja は同節本文 (L.2512-2514) を verbatim 連結。
      表 4-1 SBOM 適用範囲（5W1H）(L.2518-2644: 作成主体 / 作成タイミング /
      活用主体 / 対象範囲 / 作成手段 / 活用範囲 / フォーマット・項目) が
      適用項目の整理表。 M10-2 までの 「いつ / どこで / 誰が / 何を /
      なぜ / どう」 distillation は M11-3 で primary 表現 (5W1H) に
      書き戻した。

  - id: meti.env_setup.07
    phase: env_setup
    title_ja: SBOM ツールの選定
    verbatim_title_ja: SBOM ツールの選定
    evaluator_text_ja: SBOM ツールの選定
    title_en: Select and install the SBOM generation tool
    description_ja: |
      対象ソフトウェアの開発言語や組織内の制約を考慮した SBOM ツールの選定の観点を整理する。整理した観点に基づき、複数の SBOM ツールを評価し、選定する。
    description_en: |
      Select an SBOM-generation tool (Syft, Trivy, cdxgen, …) that covers
      the entire target stack and provision an environment that runs the
      tool both locally and in CI. Confirm the tool can emit both
      CycloneDX and SPDX in their major output variants.
    evaluator_hint: "Auto-signal: scan_settings.enabled_scanners is non-empty for the project (sbomhub-cli writes this) OR sboms.tool_name is non-null on the latest upload."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.2 SBOM ツールの選定 + 4.3 SBOM ツールの導入・設定"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.2 section 見出し
      「SBOM ツールの選定」 (L.2869) を byte-exact 転載。 description_ja
      は同節 checklist 2 □ 行 (L.2871-2872 「対象ソフトウェアの開発言語
      や組織内の制約を考慮した SBOM ツールの選定の観点を整理する。」 +
      L.2893 「整理した観点に基づき、複数の SBOM ツールを評価し、
      選定する。」) を verbatim 連結。 表 4-2 SBOM ツールの選定の観点
      (機能 / 性能 / 解析可能な情報 / 解析可能なデータ形式 / コスト /
      対応フォーマット / コンポーネント解析方法 / サポート体制 / 他
      ツールとの連携 / 提供形態 / ユーザーインターフェース / 運用方法 /
      対応するソフトウェア開発言語 / 日本語対応、 L.2957-3129) は補助
      参照。 個別運用 (4.3 のみ) は env_setup.10 を参照。 M10-2 までの
      「SBOM 生成ツールを選定・導入」 distillation は M11-3 で primary
      section 見出しに書き戻した。

  - id: meti.env_setup.08
    phase: env_setup
    title_ja: SBOM ツールに関する学習
    verbatim_title_ja: SBOM ツールに関する学習
    evaluator_text_ja: SBOM ツールに関する学習
    title_en: Train the SBOM team
    description_ja: |
      ツールの取扱説明書や README ファイルを確認して、SBOM ツールの使い方を習得する。ツールの使い方に関するノウハウや各機能の概要は記録し、組織内で共有する。
    description_en: |
      Train the responsible team on reading SBOM formats (CycloneDX / SPDX),
      PURL / CPE identifiers, VEX / VDR semantics, and vulnerability
      databases (NVD / JVN / KEV); retain training records as audit
      evidence.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_08'. Future hook: tenant training_records table."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.4 SBOM ツールに関する学習"
    notes: |
      M11-3 VERBATIM: title_ja は primary PDF 4.4 section 見出し
      「SBOM ツールに関する学習」 (L.3202) を byte-exact 転載。
      description_ja は同節 checklist 2 □ 行 (L.3207-3208 「ツールの
      取扱説明書や README ファイルを確認して、SBOM ツールの使い方を
      習得する。」 + 「ツールの使い方に関するノウハウや各機能の概要は
      記録し、組織内で共有する。」) を verbatim 連結。 M10-2 までの
      「担当者教育・トレーニングを実施」 distillation (CycloneDX / SPDX /
      PURL / CPE / VEX / VDR / NVD / JVN / KEV 等を含む SBOM 周辺知識
      包括トレーニング) は M11-3 で primary 文言に書き戻した。 補助知識
      の網羅性は evaluator_hint 側で保持。

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.env_setup.09
    phase: env_setup
    title_ja: 対象ソフトウェアの正確な構成図を作成し、SBOM 適用の対象を可視化する
    verbatim_title_ja: 対象ソフトウェアの正確な構成図を作成し、SBOM 適用の対象を可視化する
    evaluator_text_ja: 対象ソフトウェアの正確な構成図を作成し、SBOM 適用の対象を可視化する
    title_en: Visualise the target software's architecture diagram
    description_ja: |
