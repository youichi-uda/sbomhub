# METI SBOM Catalog (M3-3, issue #39 / M5-6, issue #52 / M8-1, issue #62)
#
# Self-assessment criteria derived from "ソフトウェア管理に向けた SBOM
# (Software Bill of Materials) の導入に関する手引 ver 2.0" (経済産業省, 2024-08).
#
# M8-1 (issue #62, 2026-06-28): 27 → 32 criteria。 IPA 中核人材育成プログラム
# 「SBOM 導入・運用の手引き」 (2024-12 版) の 32-item 全項目との 1:1 対応を
# 達成。 追加項目は env_setup +3 (4.1.4 構成図可視化 / 4.4 ツール導入設定 /
# 4.5 ツール学習)、 sbom_creation +1 (5.3 SBOM 共有)、 sbom_operation +1
# (6.3 SBOM 提供期間 個別運用)。 phase 配分: env_setup 11 / sbom_creation 10
# / sbom_operation 11 = 32 items。 追加 5 件はいずれも auto-signal 未実装の
# stub evaluator (StatusNeedsReview) として登録、 wording exact-match と
# auto-signal 実装は M8-2 wave で対応。
#
# Source:
#   https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2.pdf
#   https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2gaiyou.pdf (概要 PDF)
#   https://www.meti.go.jp/english/policy/safety_security/cybersecurity/downloadfiles/sbom_tebiki02_en.pdf (English)
#   https://www.meti.go.jp/press/2024/08/20240829001/20240829001.html (press release)
#
# M5-6 reconciliation note (issue #52, 2026-06-27):
#   The primary PDF (3 MB) timed out on every WebFetch / curl probe against
#   meti.go.jp from the build environment, and the appendix xlsx URL is not
#   linked from the press page in a stable form. The wording below was
#   reconciled against the following secondary sources whose chapter
#   structure (env_setup / sbom_creation / sbom_operation) explicitly cites
#   METI ver 2.0:
#     1. IPA 産業サイバーセキュリティセンター中核人材育成プログラム
#        「SBOM 導入・運用の手引き」 (2024年12月、 経産省 ver 2.0 を参考に構成、
#        cited as [1] throughout):
#        https://www.ipa.go.jp/jinzai/ics/core_human_resource/final_project/2024/sbn8o10000001y6j-att/sbn8o10000001zcl.pdf
#        Chapter 4-6 implementation checklist tables (表：4.1.1 / 4.2.1 / 4.3.1 /
#        4.4.1 / 4.5.1 / 5.1.1 / 5.2.1 / 5.3.1 / 6.1.1 / 6.2.1 / 6.3.1) were
#        cross-checked against the wording fields below.
#     2. yamory / nikkei xtech / Newton Consulting commentary on the
#        ver 1.0 → 2.0 diff (第7章 脆弱性管理プロセスの具体化, 付録 SBOM 対応
#        モデル, 付録 SBOM 取引モデル).
#     3. The already-shipped 18-item baseline in
#        apps/api/internal/model/checklist.go (PhaseSetup / PhaseCreation /
#        PhaseOperation), which itself was derived from ver 1.0.
#     4. IPA SBOM minimum-element list already validated by
#        apps/api/internal/service/compliance.go checkMinimumElements.
#
#   Outstanding: the primary PDF should be re-fetched (e.g. from a
#   network position that reaches meti.go.jp without timeout) so that the
#   wording can be quoted verbatim from the original. metadata.verification_status
#   stays at "partial" until that lift is complete. See STATUS.md M5-6
#   entry for the residual checklist.
#
# Schema (one entry):
#   - id:               stable, dotted, lowercase. "meti.<phase>.<seq>".
#   - phase:            "env_setup" | "sbom_creation" | "sbom_operation"
#   - title_ja:         short Japanese title
#   - title_en:         short English title
#   - description_ja:   longer Japanese description (what to do, why)
#   - description_en:   longer English description (what to do, why)
#   - evaluator_hint:   English free-form pointer that the M3-2 evaluator
#                       agent uses to pick which DB table / setting / scan
#                       artefact to inspect. Keep it concrete enough that a
#                       grep over the codebase resolves to the relevant
#                       service (e.g. "scan_settings.enabled_scanners",
#                       "sboms table created_at frequency").
#   - source_section:   chapter / sub-section reference in the official
#                       METI guidance (Japanese, format "第N章 N.N 小見出し").
#                       Required from M5-6 — the loader rejects criteria
#                       without it so a future authoring round cannot
#                       silently lose provenance.

metadata:
  source: "経済産業省 ソフトウェア管理に向けた SBOM (Software Bill of Materials) の導入に関する手引 ver 2.0"
  source_url: "https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2.pdf"
  source_summary_url: "https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2gaiyou.pdf"
  source_version: "ver 2.0"
  source_published: "2024-08-29"
  last_synced: "2026-06-28"
  synced_by: "M8-2 issue #63 (M5-6 issue #52 / M8-1 issue #62 を継承)"
  verification_status: "partial"
  verification_notes: |
    M5-6 (issue #52) で METI ver 2.0 公式 PDF の WebFetch / curl 取得が全試行
    タイムアウト。 IPA 産業サイバーセキュリティセンター中核人材育成プログラム
    「SBOM 導入・運用の手引き」 (2024年12月、 METI ver 2.0 を [1] として明示参照)
    の表：4.1.1 〜 表：6.3.1 (実施事項チェックリスト) と章構成 (第4-6章) を
    二次資料として照合済。 ver 2.0 で新規追加された第7章 (脆弱性管理プロセスの
    具体化) は meti.sbom_operation.01 / 02 / 03 / 04 / 08 に分解反映。 付録
    「SBOM 対応モデル」 「SBOM 取引モデル」 は契約条項として
    meti.env_setup.03 / meti.sbom_creation.07 / meti.sbom_creation.09 に
    関連付け済。 一次 PDF の原文ママ照合は再 fetch 成功後の wave 持ち越し。

    M8-2 (issue #63, 2026-06-28) で再 fetch を試行: 一次 (SBOMv2.pdf) / 概要
    (SBOMv2gaiyou.pdf) / 英語版 (sbom_tebiki02_en.pdf) の 3 URL いずれも
    WebFetch (60s) / curl (60s) で完全タイムアウト。 build 環境からの
    `https://www.meti.go.jp/` 自体が 15s 内に応答せず (google.com は 0.19s で
    200 応答)、 M5-6 で観測した meti.go.jp 全面遮断パターンが継続している
    ことを確認。 一次 PDF の原文ママ照合は user 環境での offline PDF
    取得 + repo fixture 配置 (例: testdata/meti/SBOMv2.pdf) 後の follow-up
    wave に持ち越し。 verification_status は引き続き "partial"。 一方、
    catalog_test.go の title_ja exact-match regression は M8-1 で確定した
    32 件全件に拡張 (公式照合と独立した、 既存 wording の意図せぬ drift を
    防ぐ regression gate)。

criteria:
  # --------------------------------------------------------------------------
  # Phase 1 — 環境構築・体制整備フェーズ (env_setup) : 11 items
  #   (M3-3 で 8 items / M8-1 で +3: 4.1.4 構成図可視化 / 4.4 ツール導入設定 /
  #    4.5 ツール学習)
  # --------------------------------------------------------------------------
  - id: meti.env_setup.01
    phase: env_setup
    title_ja: SBOM 担当部署および責任者を明確化
    title_en: Designate the SBOM owner team and accountable role
    description_ja: |
      SBOM 導入・運用の責任者と担当部署を明確化し、 経営層・開発・セキュリティ部門との
      役割分担を文書化する。 兼任を可とするが、 SBOM の最終承認者 (例: PSIRT 長)
      を 1 名固定し、 連絡窓口を明示する。
    description_en: |
      Identify the team and accountable individual responsible for SBOM
      adoption and operation, and document the division of responsibilities
      between leadership, engineering and security. A single final approver
      (e.g. PSIRT lead) and a contact point must be designated even when
      the role is shared with another function.
    evaluator_hint: "Manual-only. No auto-signal in DB. Map to checklist_responses table check_id='setup_01' for human attestation."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.2 SBOM 導入体制の整備 (表：4.2.1 No.1-2)"

  - id: meti.env_setup.02
    phase: env_setup
    title_ja: 対象ソフトウェアの開発言語・ビルド環境を整理
    title_en: Inventory the target software's languages and build environment
    description_ja: |
      SBOM 生成対象とするソフトウェアの開発言語、 ビルドツール (Maven / Gradle /
      npm / pip / Go modules 等)、 コンテナ / OS パッケージの構成を棚卸しし、
      どの言語に対し どの SBOM ツール (Syft / Trivy / cdxgen) を充てるかを決定する。
    description_en: |
      Inventory the languages, build tools (Maven / Gradle / npm / pip / Go
      modules, etc.) and container / OS-package layers used by the target
      software, and decide which scanner (Syft / Trivy / cdxgen) covers each
      stack so that no ecosystem is silently omitted from SBOM generation.
    evaluator_hint: "Auto-signal: sboms.bom_format and components.purl prefixes — distinct PURL types observed across all sboms for the project indicate ecosystems covered. Map to projects.metadata for declared stack vs. coverage gap."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (表：4.1.1 No.3 開発言語・コンポーネント形態)"

  - id: meti.env_setup.03
    phase: env_setup
    title_ja: サプライヤー / OSS 配布元との契約形態・取引慣行を明確化
    title_en: Clarify contract and trading practices with suppliers / OSS distributors
    description_ja: |
      ソフトウェアの調達契約 / OSS ライセンス / SBOM 提供義務 / 脆弱性開示
      SLA を確認し、 サプライヤーから SBOM を受領する経路と頻度、 受領 SBOM の
      取り扱いポリシー (再配布可否 / 保管期間) を契約条項として明文化する。
    description_en: |
      Review procurement contracts, OSS licences, SBOM-delivery obligations
      and vulnerability-disclosure SLAs, and codify in contract clauses the
      channel and cadence by which SBOMs are received from suppliers, plus
      the handling policy (re-distribution rights, retention period).
    evaluator_hint: "Manual-only. No DB signal. Map to checklist_responses check_id='setup_03'. Future hook: supplier_contracts table when added."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (契約形態・取引慣行) / 付録 SBOM 取引モデル (ver 2.0 新規)"

  - id: meti.env_setup.04
    phase: env_setup
    title_ja: 適用される規制・要求事項を確認
    title_en: Confirm applicable regulations and requirements
    description_ja: |
      自社製品が出荷される地域 / 業界の規制 (EU CRA, 米国 EO 14028, NIST SP
      800-218, IPA 政府調達基準 等) を棚卸しし、 SBOM 形式・最小要素・提出
      期限の各要件を満たすよう設計に反映する。
    description_en: |
      Inventory the regulations and standards that apply to your product's
      shipping geography and industry (EU CRA, US EO 14028, NIST SP 800-218,
      IPA procurement guidelines, etc.) and reflect SBOM-format, minimum-
      element and submission-deadline requirements in the design.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_04'. Future hook: cra_reports presence indicates EU CRA scope is in play."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (規制や要求)"

  - id: meti.env_setup.05
    phase: env_setup
    title_ja: 組織内制約 (機密情報の取り扱い / 公開範囲) を明確化
    title_en: Clarify organisational constraints (confidentiality, disclosure scope)
    description_ja: |
      SBOM に含まれる内部依存・社内ライブラリ情報の機密区分、 顧客への
      公開範囲、 第三者への提供範囲を定義し、 公開用 SBOM / 内部用 SBOM
      の使い分けポリシーを定める。
    description_en: |
      Define confidentiality classifications for internal dependencies and
      proprietary libraries that may appear in an SBOM, decide the disclosure
      scope toward customers and third parties, and establish a policy for
      separating public from internal SBOM variants.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_05'. Future hook: public_links.is_public flag history per project."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (表：4.1.1 No.5 組織内の制約)"

  - id: meti.env_setup.06
    phase: env_setup
    title_ja: SBOM 適用範囲 (5W1H) を明確化
    title_en: Define the SBOM application scope (5W1H)
    description_ja: |
      いつ (リリース / 定期 / CI 毎)、 どこで (本番 / ステージング / 内部)、
      誰が (開発 / セキュリティ / 顧客)、 何を (対象製品・モジュール)、
      なぜ (規制 / 顧客要求 / 内部監査)、 どう (自動 / 手動) SBOM を扱うかを
      文書化する。
    description_en: |
      Document who creates and consumes the SBOM, when it is produced
      (release / scheduled / per-CI), where it covers (production / staging /
      internal), what targets and modules are in scope, why it is required
      (regulation / customer / internal audit) and how it is handled
      (automated vs. manual).
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_06'. Auto-augment: count of distinct project ids vs. scan_settings rows indicates whether scope is consistently configured."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (表：4.1.1 No.6 / 表：4.1.2 5W1H による SBOM 適用範囲)"

  - id: meti.env_setup.07
    phase: env_setup
    title_ja: SBOM 生成ツールを選定・導入
    title_en: Select and install the SBOM generation tool
    description_ja: |
      対象スタックを網羅する SBOM 生成ツール (Syft, Trivy, cdxgen 等) を
      選定し、 ローカル / CI 双方で実行できる環境を構築する。 ツールは
      CycloneDX / SPDX 双方の主要出力に対応していることを確認する。
    description_en: |
      Select an SBOM-generation tool (Syft, Trivy, cdxgen, …) that covers
      the entire target stack and provision an environment that runs the
      tool both locally and in CI. Confirm the tool can emit both
      CycloneDX and SPDX in their major output variants.
    evaluator_hint: "Auto-signal: scan_settings.enabled_scanners is non-empty for the project (sbomhub-cli writes this) OR sboms.tool_name is non-null on the latest upload."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.3 SBOM ツールの選定 (表：4.3.1) + 4.4 SBOM ツールの導入・設定 (表：4.4.1)"

  - id: meti.env_setup.08
    phase: env_setup
    title_ja: 担当者教育・トレーニングを実施
    title_en: Train the SBOM team
    description_ja: |
      SBOM 形式 (CycloneDX / SPDX) の読み方、 PURL / CPE 識別子、 VEX / VDR
      の意味、 脆弱性データベース (NVD / JVN / KEV) の使い方について
      担当者向けトレーニングを実施し、 受講記録を保管する。
    description_en: |
      Train the responsible team on reading SBOM formats (CycloneDX / SPDX),
      PURL / CPE identifiers, VEX / VDR semantics, and vulnerability
      databases (NVD / JVN / KEV); retain training records as audit
      evidence.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_08'. Future hook: tenant training_records table."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.5 SBOM ツールの学習 (表：4.5.1 開発・セキュリティ部門への教育)"

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.env_setup.09
    phase: env_setup
    title_ja: 対象ソフトウェアの構成図を可視化
    title_en: Visualise the target software's architecture diagram
    description_ja: |
      SBOM 適用範囲を明確化するため、 対象ソフトウェアの構成図 (アプリ /
      コンテナ / OS / ファームウェア / サプライヤー提供コンポーネントの
      レイヤと境界) を可視化し、 SBOM 生成対象として組み込むコンポーネントの
      範囲・除外範囲を識別する。 構成図はリリース毎に更新する。
    description_en: |
      To clarify the SBOM application scope, visualise the target software's
      architecture diagram — the application, container, OS, firmware and
      supplier-supplied component layers and their boundaries — and identify
      which components are in / out of SBOM scope. Refresh the diagram on
      every release.
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 構成図 (architecture diagram) は現状 DB 表現を持たないため manual attestation 必須。 M8-2 以降の hook 候補: projects.architecture_diagram_url / sboms.RawData の metadata.component 階層解析。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (4.1.4 対象ソフトウェアの構成図 / 表：4.1.4 構成図可視化)"

  - id: meti.env_setup.10
    phase: env_setup
    title_ja: SBOM ツールを導入・設定 (個別運用)
    title_en: Install and configure the SBOM tool (per-deployment settings)
    description_ja: |
      選定済 SBOM 生成ツール (env_setup.07) を実行環境にインストールし、
      対象スタック毎の設定 (スキャン対象ディレクトリ / 除外パターン /
      ライセンス検出オプション / 出力形式 / lockfile 解決ポリシー 等) を
      個別に最適化する。 ツール選定 (4.3) とは独立した運用工程として
      導入・設定の妥当性を確認する (4.4)。
    description_en: |
      Install the previously-selected SBOM generation tool (env_setup.07) into
      the runtime environment, and tune per-stack settings (scan target
      directories, exclusion patterns, licence-detection options, output
      format, lockfile-resolution policy, etc.). Validate installation /
      configuration adequacy as an operational step distinct from tool
      selection (4.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 ツール選定 (env_setup.07) との重複を避けるため、 ここでは個別設定値 (scan_settings.enabled_scanners 詳細 / exclusion patterns / output spec_version 固定) の妥当性を判定したい。 M8-2 以降の hook 候補: scan_settings.config_json 拡張、 sbomhub-cli の `doctor` 出力との突合。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.4 SBOM ツールの導入・設定 (表：4.4.1 ツール導入手順・設定項目)"

  - id: meti.env_setup.11
    phase: env_setup
    title_ja: SBOM ツールの学習 (運用習熟度確認)
    title_en: Practise with the SBOM tool (operator proficiency check)
    description_ja: |
      担当者教育 (env_setup.08) で習得した知識をもとに、 実際の対象ソフトウェアに
      対して SBOM 生成・解析エラー対応・出力検証を一通り実施し、 運用習熟度
      (生成所要時間 / エラー復旧時間 / 解釈の正確性) を測定する。 習熟度
      ベースラインを記録し、 ローテーション / 新規参画時の引き継ぎ基準とする。
    description_en: |
      Building on the basic training (env_setup.08), have operators run the
      tool end-to-end against the actual target software — generation, error
      handling, output validation — and measure proficiency (generation time,
      error-recovery time, interpretation accuracy). Record proficiency
      baselines and reuse them for rotation / onboarding handovers.
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 担当者教育 (env_setup.08) との重複を避けるため、 ここでは「教育受講後に実機で動かしたか」 のハンズオン実績 (sboms.created_by ユーザ多様性 / 直近 90 日の operator 数) を判定したい。 M8-2 以降の hook 候補: audit_logs の sbom.created actor 集計、 training_completion テーブル。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.5 SBOM ツールの学習 (表：4.5.1 ハンズオン演習・運用習熟度評価)"

  # --------------------------------------------------------------------------
  # Phase 2 — SBOM 作成・共有フェーズ (sbom_creation) : 10 items
  #   (M3-3 で 9 items / M8-1 で +1: 5.3 SBOM 共有 個別運用)
  # --------------------------------------------------------------------------
  - id: meti.sbom_creation.01
    phase: sbom_creation
    title_ja: SBOM 作成方針 (頻度 / トリガー / 粒度) を決定
    title_en: Decide the SBOM creation policy (frequency, trigger, granularity)
    description_ja: |
      SBOM をいつ (リリース毎 / マージ毎 / 夜次) どの粒度 (アプリ単位 /
      コンテナイメージ単位 / モジュール単位) で生成するかを決め、 CI に
      組み込む。 サプライヤー納品物については受領のたびに再生成する。
    description_en: |
      Decide the SBOM creation cadence (per release, per merge, nightly)
      and granularity (application, container image, module) and wire it
      into CI. For supplier-delivered artefacts, regenerate the SBOM at
      each delivery.
    evaluator_hint: "Auto-signal: COUNT(sboms WHERE project_id=...) per 30 days indicates cadence. scan_settings.schedule field indicates declared trigger."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (表：5.1.1 No.2 精査範囲) / 5.2 SBOM の作成 (頻度・粒度)"

  - id: meti.sbom_creation.02
    phase: sbom_creation
    title_ja: SBOM 形式 (CycloneDX / SPDX) を選定
    title_en: Select the SBOM format (CycloneDX / SPDX)
    description_ja: |
      取引先 / 監査人 / 規制要件にあわせて CycloneDX または SPDX (あるいは
      両形式) を選定し、 形式バージョン (例: CycloneDX 1.5+, SPDX 2.3) を
      固定する。 VEX 同梱要件があれば CycloneDX を優先する。
    description_en: |
      Select CycloneDX, SPDX or both as the canonical SBOM format aligned
      with trading partner, auditor and regulatory needs, and pin the
      format version (e.g. CycloneDX 1.5+, SPDX 2.3). If VEX must be
      bundled, prefer CycloneDX.
    evaluator_hint: "Auto-signal: sboms.bom_format ('CycloneDX' or 'SPDX') and sboms.spec_version on latest upload."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.2 SBOM の作成 (表：5.2.1 No.1 フォーマット・出力ファイル形式の決定)"

  - id: meti.sbom_creation.03
    phase: sbom_creation
    title_ja: コンポーネントを解析し SBOM を生成
    title_en: Analyse components and generate the SBOM
    description_ja: |
      選定したツールでビルド成果物 / ソースリポジトリ / コンテナイメージを
      スキャンし、 直接依存と推移依存を漏れなく抽出した SBOM を生成する。
    description_en: |
      Scan build artefacts, source repositories and container images with
      the selected tool and produce an SBOM that captures direct and
      transitive dependencies without omissions.
    evaluator_hint: "Auto-signal: sboms exists for the project AND latest sbom has components count > 0."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (表：5.1.1 No.1) + 5.2 SBOM の作成 (表：5.2.1 No.2)"

  - id: meti.sbom_creation.04
    phase: sbom_creation
    title_ja: 解析エラー (パース失敗 / バージョン不明) を確認
    title_en: Confirm analysis errors (parse failure, unknown version)
    description_ja: |
      スキャナのエラーログ・警告を確認し、 「version: unknown」 や パース失敗
      で除外されたコンポーネントを残さない。 残存する場合は理由を記録する。
    description_en: |
      Review scanner error logs and warnings; do not leave components
      dropped as "version: unknown" or due to parse failures. Where they
      cannot be resolved, record the reason for the exception.
    evaluator_hint: "Auto-signal: COUNT(components WHERE version IS NULL OR version='unknown') for latest sbom should be 0 for a passing item."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (表：5.1.1 No.3 解析エラー / version 不明検出)"

  - id: meti.sbom_creation.05
    phase: sbom_creation
    title_ja: 誤検出・検出漏れを確認
    title_en: Verify false positives and false negatives
    description_ja: |
      ツール出力結果をそのまま用いず、 手動ビルド成果物 / package-lock /
      go.sum 等と突き合わせ、 誤検出 (実際には含まれない) と 検出漏れ
      (実際は含まれるが SBOM 未掲載) を確認する。
    description_en: |
      Do not rely on tool output as-is: cross-check against build manifests
      (package-lock, go.sum, etc.) to flag false positives (listed but not
      actually shipped) and false negatives (shipped but missing from the
      SBOM).
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='create_03'. Future hook: diff sboms generated by Syft vs. Trivy and surface unique entries."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (表：5.1.1 No.3 抜け漏れ・過検知の精査)"

  - id: meti.sbom_creation.06
    phase: sbom_creation
    title_ja: METI / NTIA 最小要素を満たす SBOM を作成
    title_en: Produce an SBOM meeting METI / NTIA minimum elements
    description_ja: |
      Supplier Name / Component Name / Component Version / Unique
      Identifier (PURL or CPE) / Dependency Relationship / SBOM Author /
      Timestamp の 7 項目を満たすことを生成時に検証する。
    description_en: |
      At generation time, validate that the SBOM satisfies the seven
      minimum elements: supplier name, component name, component version,
      unique identifier (PURL or CPE), dependency relationship, SBOM
      author and timestamp.
    evaluator_hint: "Auto-signal: reuse ComplianceService.checkMinimumElements (apps/api/internal/service/compliance.go) — all 7 sub-checks pass."
    source_section: "第2章 SBOM の概要 — 2.3 SBOM の最小要素 (NTIA Minimum Elements) + 第5章 5.2 SBOM の作成"

  - id: meti.sbom_creation.07
    phase: sbom_creation
    title_ja: SBOM 共有方法・配布契約を整備
    title_en: Establish SBOM sharing channels and distribution terms
    description_ja: |
      顧客 / 監査人 / 規制当局への配布チャネル (顧客ポータル, 暗号化メール,
      公開リンク 等) と、 受領者の SBOM 取り扱い条項 (再配布禁止 / 保管期間 /
      開示範囲) を契約として整備する。
    description_en: |
      Establish the distribution channels (customer portal, encrypted
      e-mail, public link, …) for customers / auditors / regulators and
      put in place contractual handling terms for recipients (no
      redistribution, retention period, permitted disclosure scope).
    evaluator_hint: "Auto-signal: public_links rows exist for the project (indicates shareable URL provisioned). Manual override via checklist_responses check_id='create_07'."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.3 SBOM の共有 (表：5.3.1 No.1-3 公開範囲・共有方法) / 付録 SBOM 取引モデル (ver 2.0 新規、 受発注者間の SBOM 規定)"

  - id: meti.sbom_creation.08
    phase: sbom_creation
    title_ja: SBOM のバージョン管理と差分追跡を実施
    title_en: Version-control SBOMs and track diffs
    description_ja: |
      ソフトウェアリリースごとに SBOM を版管理し、 前版との差分 (追加 / 削除 /
      バージョン更新) を可視化する。 差分が顧客通知トリガーになる場合は
      自動通知する。
    description_en: |
      Version-control the SBOM at each release and visualise the diff
      against the previous version (added, removed, updated components).
      If diffs should trigger customer notification, automate the alert.
    evaluator_hint: "Auto-signal: sbom_diff service exists and ≥2 sbom revisions exist for the project (so diffs are computable)."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.3 SBOM 情報の管理 (表：6.3.1 No.3 SBOM の更新条件・時期) — リリース毎の差分追跡"

  - id: meti.sbom_creation.09
    phase: sbom_creation
    title_ja: サプライヤー受領 SBOM のマージ / 検証
    title_en: Merge and validate supplier-provided SBOMs
    description_ja: |
      自社が再配布する成果物にサプライヤー製コンポーネントが含まれる場合、
      その SBOM を受領し、 自社 SBOM にマージするか リンクするかを定め、
      受領 SBOM の妥当性 (署名・タイムスタンプ・形式準拠) を検証する。
    description_en: |
      When shipping artefacts that contain supplier-built components,
      decide whether to merge or link the supplier's SBOM into your own,
      and validate the supplier SBOM (signature, timestamp, format
      conformance) before accepting it.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='create_09'. Future hook: sboms.source ('uploaded' vs. 'merged') column."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.2 SBOM の作成 (第三者提供 SBOM のインポート) / 付録 SBOM 取引モデル (受領 SBOM の品質・責任、 ver 2.0 新規)"

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.sbom_creation.10
    phase: sbom_creation
    title_ja: SBOM 共有プロセスを個別運用 (受領者管理 / 通知)
    title_en: Operate SBOM sharing per recipient (audience management, notifications)
    description_ja: |
      SBOM 共有方法・配布契約 (sbom_creation.07) を整備した上で、 個別受領者
      毎の共有実績 (誰に / いつ / どの版を / どのチャネルで送付したか) を
      記録し、 更新版発行時の通知・引き渡し済 SBOM の差替えを運用する。
      受領者リスト / 連絡先 / 共有 SBOM 履歴を台帳化し、 監査時に提示できる
      状態を維持する (5.3)。
    description_en: |
      After establishing sharing channels and distribution terms
      (sbom_creation.07), operate per-recipient SBOM sharing: record who
      received which SBOM revision, when, through which channel; notify
      recipients on new revisions; and replace previously delivered SBOMs
      as needed. Maintain a ledger of recipients, contacts and shared-SBOM
      history that can be presented on audit (5.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 配布契約整備 (sbom_creation.07) との重複を避けるため、 ここでは「個別運用が回っているか」 (公開リンクのアクセスログ / public_links.created_at 系列 / 通知配信履歴) を判定したい。 M8-2 以降の hook 候補: public_link_access_logs テーブル、 notification_deliveries テーブル。"
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.3 SBOM の共有 (表：5.3.1 No.4 受領者管理・通知・更新版差替え)"

  # --------------------------------------------------------------------------
  # Phase 3 — SBOM 運用・管理フェーズ (sbom_operation) : 11 items
  #   (M3-3 で 10 items / M8-1 で +1: 6.3 SBOM 提供期間 個別運用)
  # --------------------------------------------------------------------------
  - id: meti.sbom_operation.01
    phase: sbom_operation
    title_ja: 脆弱性監視プロセスを確立
    title_en: Establish a vulnerability monitoring process
    description_ja: |
      手引 ver 2.0 第 7 章の脆弱性管理プロセスに従い、 SBOM 内の各コンポーネント
      を脆弱性データベースと突き合わせる定常運用 (実行頻度・担当・SLA) を
      確立する。
    description_en: |
      Following Chapter 7 of the ver 2.0 guidance, establish steady-state
      operations (cadence, owner, SLA) that match each SBOM component
      against vulnerability databases.
    evaluator_hint: "Auto-signal: scan_settings.vuln_scan_enabled is true AND last scan_tracker entry is within configured cadence."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — フェーズ1 脆弱性特定 / 第6章 6.1 SBOM に基づく脆弱性管理 (表：6.1.1 No.1)"

  - id: meti.sbom_operation.02
    phase: sbom_operation
    title_ja: 脆弱性情報源 (NVD / JVN / KEV / GHSA / JPCERT) を特定
    title_en: Identify vulnerability information sources (NVD / JVN / KEV / GHSA / JPCERT)
    description_ja: |
      参照する脆弱性データベースを明示し、 同期頻度 (例: NVD 24h, KEV 24h,
      JVN 24h) と 重要度通知の閾値 (例: CVSS 7.0 以上) を定義する。
    description_en: |
      Enumerate the vulnerability databases consulted, define the
      synchronisation cadence (e.g. NVD 24h, KEV 24h, JVN 24h) and the
      severity-notification threshold (e.g. CVSS ≥ 7.0).
    evaluator_hint: "Auto-signal: nvd, jvn, kev service tables have recent updated_at (<48h). Service files: apps/api/internal/service/{nvd,jvn,kev}.go."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — フェーズ1 脆弱性特定 / 第6章 6.1 SBOM に基づく脆弱性管理 (表：6.1.1 No.2 脆弱性 DB の選定)"

  - id: meti.sbom_operation.03
    phase: sbom_operation
    title_ja: 脆弱性を優先付け (EPSS / SSVC / CVSS / KEV)
    title_en: Prioritise vulnerabilities (EPSS / SSVC / CVSS / KEV)
    description_ja: |
      検出された脆弱性に対し、 CVSS だけでなく EPSS (悪用予測スコア),
      KEV (既知悪用), SSVC (意思決定フレーム) を併用して対応順序を決定する。
    description_en: |
      For each detected vulnerability, use EPSS (exploit-probability),
      KEV (known exploited) and SSVC (decision framework) alongside CVSS
      to set the remediation order.
    evaluator_hint: "Auto-signal: vulnerabilities table has epss_score, ssvc_decision and kev_listed columns populated for ≥1 finding."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — フェーズ2 脆弱性対応の優先付け / 第6章 6.1 (表：6.1.1 No.4 対応基準方針)"

  - id: meti.sbom_operation.04
    phase: sbom_operation
    title_ja: 脆弱性対応 (VEX 作成・承認・配布) を実施
    title_en: Execute vulnerability response (VEX authoring, approval, distribution)
    description_ja: |
      対応中 / 影響なし / 修正済の判断を VEX (CycloneDX VEX or CSAF) で表現
      し、 人による承認後に顧客へ配布する。 AI ドラフトは承認前の状態として
      扱う。
    description_en: |
      Express decisions (under_investigation / not_affected / fixed) as VEX
      (CycloneDX VEX or CSAF) and distribute to customers only after human
      approval. AI-drafted statements remain unapproved until reviewed.
    evaluator_hint: "Auto-signal: vex_statements rows exist for the project with status IN ('approved','distributed'). Service: apps/api/internal/service/vex.go."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — フェーズ3 情報共有 / フェーズ4 脆弱性対応 (VEX 活用) — 第6章 6.1 コラム「VEX を用いた脆弱性管理」"

  - id: meti.sbom_operation.05
    phase: sbom_operation
    title_ja: ライセンス違反 / コンプライアンス逸脱を確認
    title_en: Check for licence violations and compliance deviations
    description_ja: |
      組織のライセンスポリシー (禁止ライセンス / 要承認ライセンス) と SBOM
      内コンポーネントの宣言ライセンスを照合し、 違反を是正する。
    description_en: |
      Reconcile each component's declared licence against the organisation's
      licence policy (prohibited / approved-with-review) and remediate
      violations.
    evaluator_hint: "Auto-signal: license_policies exist for the tenant AND license violation count = 0. Service: apps/api/internal/service/license.go."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM に基づくライセンス管理 (表：6.2.1 No.1-2 利用 OSS の洗い出し・ライセンス利用条件)"

  - id: meti.sbom_operation.06
    phase: sbom_operation
    title_ja: EOL / End-of-Support コンポーネントを特定
    title_en: Identify EOL / end-of-support components
    description_ja: |
      endoflife.date 等を参照して EOL を迎えたランタイム / フレームワーク
      を特定し、 置換ロードマップを記録する。
    description_en: |
      Identify runtimes and frameworks that have reached end-of-life
      (e.g. via endoflife.date) and record a replacement roadmap.
    evaluator_hint: "Auto-signal: eol service has produced findings for the project. Service: apps/api/internal/service/eol.go."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.1 SBOM に基づく脆弱性管理 (EOL コンポーネントの脆弱性リスク) / 6.3 SBOM 情報の管理 (表：6.3.1 No.2 SBOM 提供期間)"

  - id: meti.sbom_operation.07
    phase: sbom_operation
    title_ja: SBOM を適切な期間 保管 (監査対応)
    title_en: Retain SBOMs for the required period (audit-ready)
    description_ja: |
      製品ライフタイム + 規制要求期間 (CRA: 製品サポート期間中, 業界規制
      別途) にわたって SBOM を保管し、 改ざんなく取り出せる状態を維持する。
      ハッシュやタイムスタンプによる完全性確認を可能にする。
    description_en: |
      Retain SBOMs for the product lifetime plus the period required by
      regulation (CRA: throughout the product support window; sector
      regulations as applicable) in a tamper-evident form retrievable on
      demand, with hash / timestamp integrity checks available.
    evaluator_hint: "Auto-signal: sboms table retention policy enforced — no rows hard-deleted within retention window (check audit_log for delete events)."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.3 SBOM 情報の管理 (表：6.3.1 No.2 SBOM 提供期間 / 図：6.3.2 SBOM 保管期間の検討例)"

  - id: meti.sbom_operation.08
    phase: sbom_operation
    title_ja: インシデント対応プロセス (悪用検知時) を整備
    title_en: Establish an incident-response process (when exploitation is detected)
    description_ja: |
      KEV 追加 / EPSS 急上昇 / 悪用実例レポートを受領したコンポーネントに
      ついて、 顧客通知・暫定緩和策・恒久対応のタイムライン (24h 早期警告 /
      72h 詳細通知 / 最終報告) を整備する。 EU CRA Article 14 と整合させる。
    description_en: |
      For components added to KEV, with EPSS spikes, or with confirmed
      exploitation reports, define a timeline for customer notification,
      interim mitigation and permanent remediation (24h early warning /
      72h detailed notification / final report) consistent with EU CRA
      Article 14.
    evaluator_hint: "Auto-signal: cra_reports rows exist for the project with report_type IN ('early_warning','detailed_notification','final_report'). Service: apps/api/internal/service/cra/."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — フェーズ3 情報共有 / フェーズ4 脆弱性対応 (悪用検知時のインシデント対応タイムライン)"

  - id: meti.sbom_operation.09
    phase: sbom_operation
    title_ja: SBOM 更新頻度を遵守
    title_en: Maintain SBOM update frequency
    description_ja: |
      ソフトウェア改変・依存追加・依存削除のたびに SBOM を更新する。 最低
      でも 30 日に 1 回の再生成を運用ルールとして固定する (ver 2.0 推奨)。
    description_en: |
      Update the SBOM on every software change, dependency addition or
      dependency removal. Pin a minimum cadence of regeneration every 30
      days as an operational rule (per ver 2.0 recommendation).
    evaluator_hint: "Auto-signal: latest sboms.created_at for the project is within 30 days."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.3 SBOM 情報の管理 (表：6.3.1 No.3 SBOM の更新条件・時期)"

  - id: meti.sbom_operation.10
    phase: sbom_operation
    title_ja: 監査ログ (作成 / 共有 / 承認 / 配布) を記録
    title_en: Record audit logs (creation, sharing, approval, distribution)
    description_ja: |
      SBOM の生成・アップロード・共有・承認・配布の各イベントを操作者
      付きで記録し、 監査時に時系列でトレースできるようにする。
    description_en: |
      Log every event (generation, upload, sharing, approval, distribution)
      with the operator identity so an auditor can trace the lifecycle
      chronologically.
    evaluator_hint: "Auto-signal: audit_log table has rows for action IN ('sbom.created','sbom.shared','vex.approved','cra.distributed') for the project."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.3 SBOM 情報の管理 (表：6.3.1 No.1 SBOM 管理体制の整備 / SBOM 変更履歴の信頼性担保)"

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.sbom_operation.11
    phase: sbom_operation
    title_ja: SBOM 提供期間を個別運用 (顧客 / 製品ライン別)
    title_en: Operate per-customer / per-product SBOM provision windows
    description_ja: |
      製品ライフタイム + 規制要求期間 (sbom_operation.07) の枠組みを前提として、
      顧客 / 製品ライン / 出荷地域 / 契約タイプ毎に個別の SBOM 提供期間
      (開始日 / 終了日 / 延長条件 / 再提供 SLA) を運用する。 期間満了時の
      通知・延長判断・終了処理を SLA として定義し、 監査ログに記録する (6.3)。
    description_en: |
      Building on the lifetime + regulatory retention framework
      (sbom_operation.07), operate per-customer / per-product-line /
      per-shipping-region / per-contract-type SBOM provision windows
      (start, end, renewal conditions, re-provision SLA). Define
      notification, renewal-decision and termination procedures as an
      SLA and capture them in the audit log (6.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 保管 (sbom_operation.07) との重複を避けるため、 ここでは「顧客 / 製品ライン毎の提供期間が個別運用されているか」 (project metadata の retention_window / customer_id 紐付け / provision_end_at 配列) を判定したい。 M8-2 以降の hook 候補: project_customer_provision_windows テーブル、 sboms.retention_end_at 個別列。"
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.3 SBOM 情報の管理 (表：6.3.1 No.2 SBOM 提供期間 — 顧客 / 製品ライン別個別運用)"
