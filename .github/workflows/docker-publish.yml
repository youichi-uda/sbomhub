---
name: Docker Publish

"on":
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  REGISTRY: docker.io
  API_IMAGE: y1uda/sbomhub-api
  WEB_IMAGE: y1uda/sbomhub-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build API image (local + tags for push)
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          load: true
          push: false
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test API image
        env:
          API_TAGS: ${{ steps.meta-api.outputs.tags }}
        run: |
          API_TAG="$(printf '%s\n' "$API_TAGS" | head -n 1)"
          docker run --rm "$API_TAG" \
            /usr/local/bin/migrate-encryption --help \
            > /tmp/migrate-encryption-help.txt 2>&1
          grep -q "migrate-encryption" /tmp/migrate-encryption-help.txt

          docker run --rm --entrypoint /bin/sh "$API_TAG" \
            -c '
              test -x /app/server
              test -x /usr/local/bin/migrate-encryption
            '

      - name: Push API image
        env:
          API_TAGS: ${{ steps.meta-api.outputs.tags }}
        run: |
          printf '%s\n' "$API_TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done

      - name: Extract metadata (Web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build web image (local + tags for push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          load: true
          push: false
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keep the published web image tied to the exact local build that passed
      # smoke: runtime reachability plus Next.js standalone output presence.
      - name: Smoke test web image
        env:
          WEB_TAGS: ${{ steps.meta-web.outputs.tags }}
        run: |
          WEB_TAG="$(printf '%s\n' "$WEB_TAGS" | head -n 1)"

          docker run -d --name web-smoke -p 3000:3000 "$WEB_TAG"
          cleanup() {
            docker logs web-smoke || true
            docker rm -f web-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            # -L follows the 307 that next-intl middleware issues at `/` ->
            # `/${defaultLocale}` when NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is
            # empty (Next 16 `proxy.ts` falls back to intl-only middleware
            # without Clerk). Without -L the second curl below grep'd an
            # empty body and failed (M8 #67 F155).
            if curl -fsSL http://localhost:3000 >/dev/null 2>&1; then
              echo "web image reachable"
              break
            fi
            sleep 2
          done

          # Capture once so a single Next response is checked for both HTTP
          # status (via -w) and Next.js boot signature. The marker set is
          # deliberately lenient: any of these prove the standalone server
          # rendered an app-router page, regardless of which locale the
          # default-locale redirect lands on or whether the landing page
          # copy was retranslated.
          HTML="$(curl -fsSL http://localhost:3000)"
          if ! printf '%s' "$HTML" \
              | grep -qE 'SBOMHub|<title|__NEXT_DATA__|/_next/static/'; then
            echo "web image response missing Next.js boot signature"
            echo "--- HTTP status (curl -L) ---"
            curl -sSL -o /dev/null \
              -w 'final_status=%{http_code} effective_url=%{url_effective}\n' \
              http://localhost:3000 || true
            echo "--- first 800 bytes of body ---"
            printf '%s' "$HTML" | head -c 800
            echo
            echo "--- end body preview ---"
            exit 1
          fi

          docker run --rm --entrypoint /bin/sh "$WEB_TAG" \
            -c '
              test -x "$(command -v node)"
              test -f /app/apps/web/server.js
              test -d /app/apps/web/.next/static
            '

          trap - EXIT
          docker rm -f web-smoke

      - name: Push web image
        env:
          WEB_TAGS: ${{ steps.meta-web.outputs.tags }}
        run: |
          printf '%s\n' "$WEB_TAGS" | while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            docker push "$tag"
          done
