    verification_status を partial → full に昇格。

    M12-2 schema 設計 (option A):
      * verbatim_title_ja (新規 required field): 公式 PDF byte-exact
        wording。 dashboard provenance pane で「経産省 ver2.0」 または
        「IPA 二次資料」 のバッジと共に表示する用途。
      * evaluator_text_ja (新規 required field): SBOMHub の auto-evaluator
        (criteria/*.go) 及び manual-attestation (checklist_responses) で
        参照する semantic-correspondent label。 M11-3 distillation の
        signal correspondence を維持。
      * title_ja (既存 field、 backward compat): UI / evidence_pack
        builder / handler の表示ラベル。 M11-3 までの値を変更せず保持し、
        consumer migration を不要とした。
      * source (新規 optional field、 default 空 / meti-primary-ver2.0):
        5 件の IPA-derived criteria のみ「ipa-derived」 を設定し、
        primary PDF に独立 □ checklist 行を持たない provenance を明示。

