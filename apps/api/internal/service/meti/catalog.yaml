    description_en: |
      Establish the distribution channels (customer portal, encrypted
      e-mail, public link, …) for customers / auditors / regulators and
      put in place contractual handling terms for recipients (no
      redistribution, retention period, permitted disclosure scope).
    evaluator_hint: "Auto-signal: public_links rows exist for the project (indicates shareable URL provisioned). Manual override via checklist_responses check_id='create_07'."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.3 SBOM の共有 (checklist No.1 SBOM 共有方法の検討 / No.2 電子署名等の改ざん防止) / 付録 9 SBOM 取引モデル (ver 2.0 新規)"
    notes: |
      M10-2: primary PDF 5.3 「SBOM の共有」 (L.3562) checklist 2 項目:
      「対象ソフトウェアの利用者及び納入先に対する SBOM の共有方法を
      検討した上で、 必要に応じて、 SBOM を共有する」 / 「SBOM の共有に
      当たって、 SBOM データの改ざん防止のための電子署名技術等の活用を
