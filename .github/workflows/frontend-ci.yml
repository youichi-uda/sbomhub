# SBOMHub - Frontend CI (lint / typecheck / build)
#
# Trust Rescue P1 #17-followup / docs/ci-inventory.md §4 Action items.
#
# Companion to go-test.yml / golangci-lint.yml / rls-integration.yml. While
# those gates cover the Go backend (apps/api), this workflow covers the
# Next.js frontend (apps/web): ESLint, TypeScript noEmit, and a production
# `next build`.
#
# Enforcement policy:
#   - Lint:      HARD GATE (M11-5 #80). ESLint v9 flat config; new
#                error-level regressions fail CI. M12-5 #86 closed the
#                44 pre-existing warnings to zero and promoted the
#                react-hooks `set-state-in-effect` + `immutability` rules
#                to `error`. See apps/web/eslint.config.mjs for the
#                rule-promotion + inline-disable rationale.
#   - Typecheck: HARD GATE (M12-5 #86). Promoted from warn-only after the
#                M11-5 lint cleanup left tsc --noEmit at zero errors.
#   - Build:     HARD GATE (M12-5 #86). `next build` must succeed end-to-end.
#                Promoted at the same time as typecheck for the same
#                reason — the M11-1 F164 production-build hydration-crash
#                isolation taught us that `next dev` is not a sufficient
#                guard against RSC full-SSR-hydration regressions.
#
# Hard gates should appear in the Required status checks list — see
# docs/ci-inventory.md §2.3.
#
# Versions:
#   - Node 22 LTS — engines.node in root package.json is `>=18.0.0` and
#     apps/web pins `@types/node@^22`. Node 22 is the current LTS.
#   - pnpm 10.34.3 — pinned to match root `package.json` `packageManager`
#     field (M8 #67 F154). pnpm 11.x requires Node 22+ but also breaks
#     the Docker web image (node:20-alpine) when corepack auto-pulls it,
#     so we hold the whole project on the 10.x line. pnpm-lock.yaml is
#     `lockfileVersion: '9.0'`, which pnpm 10 reads and writes natively.

name: Frontend CI

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/frontend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend:
    name: lint / typecheck / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Show versions
        run: |
          node --version
          pnpm --version

      # M10-4 #72: pnpm-workspace.yaml placeholder guard.
      # `pnpm approve-builds` (or a casual edit) can drop a stale
      # onlyBuiltDependencies scaffold (a per-package "set true or false"
      # comment) into pnpm-workspace.yaml. M5-M9 saw this recur several
      # times and required manual `git checkout --` reverts. Fail fast on
      # PR. grep `-v '^[[:space:]]*#'` strips comment lines so the header
      # comment in pnpm-workspace.yaml documenting this guard doesn't
      # self-trigger.
      - name: Guard pnpm-workspace.yaml against placeholder
        run: |
          if grep -vE '^[[:space:]]*#' pnpm-workspace.yaml | grep -F 'set this to true or false'; then
            echo "::error file=pnpm-workspace.yaml::pnpm-workspace.yaml contains the pnpm approve-builds scaffold placeholder. Revert with: git checkout -- pnpm-workspace.yaml (see header comment in the file for context, M10-4 #72)."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # M10-4 #72 + M10-Phase-D F161: pnpm 10 lifecycle-script skip probe.
      # pnpm 10.34.3 auto-skips lifecycle (build) scripts for several
      # native-binding packages and only logs an informational warning.
      # M8 F154 verified the first-run was OK, but a future major bump
      # (pnpm 11, the package itself, Node 22→24, etc.) could land a
      # regression where the native binding is missing at runtime —
      # only surfacing in production logs (e.g. `Cannot find module
      # './build/Release/sharp.node'`).
      #
      # F161 fix: require()-alone does NOT prove the native binding
      # actually loaded — `sharp` ships a wasm fallback, `@swc/core`
      # can transpile without the .node addon for some operations, and
      # `@clerk/shared` is a pure-JS package without any native binding.
      # Replace the generic require loop with package-specific native
      # execution probes that fail if the native binding is missing or
      # silently downgraded to a JS/WASM shim. `@clerk/shared` is no
      # longer in the list (no native artifact to assert against).
      # Hard gate (no continue-on-error): a missing binding is a
      # release blocker. If a package needs to be removed from this
      # list (e.g. it's no longer a transitive dep), update the probe
      # AND the root package.json `//pnpm-skip-monitor` note in lockstep.
      - name: pnpm 10 lifecycle script skip probe (M10-4 / F161)
        run: node .github/scripts/pnpm-native-probe.mjs

      # M10-4 #72: proxy.ts middleware matcher regression fixture.
      # Asserts the matcher does not let arbitrary `.json` / `.txt`
      # files at root bypass the auth path (the pre-M10-4 `.*\..*`
      # rule used to). Hard gate (no continue-on-error): the matcher
      # is a security invariant, regressing it is a release blocker.
      - name: Proxy matcher invariant (M10-4)
        run: node apps/web/src/proxy.matcher.test.mjs

      # M14-2 #94: UI primitive ARIA + type/render invariants
      # (F209 Tooltip role + aria-describedby, F210 AlertDescription
      # type/render alignment, F211 CardTitle ref/props symmetry,
      # F212 AlertDialogTitle wrapper role=presentation). The 4
      # primitives close the cosmetic class of anti-pattern 48
      # (fix-one-instance-leave-pattern) — a regression here means
      # SR contracts at every callsite (eol-badge, kev-badge,
      # ssvc-badge, ticket-status, settings/apikeys delete confirm,
      # settings/integrations delete confirm, etc.) silently
      # degrade at once. node --test runs all four files in one
      # process, ~50ms total.
      - name: UI primitive invariants (M14-2 F209-F212)
        run: |
          node --test \
            apps/web/src/components/ui/__tests__/tooltip.test.mjs \
            apps/web/src/components/ui/__tests__/alert.test.mjs \
            apps/web/src/components/ui/__tests__/card.test.mjs \
            apps/web/src/components/ui/__tests__/alert-dialog.test.mjs

      # M11-5 #80: hard gate after the ESLint v9 flat-config migration.
      # Next 16 removed `next lint`; we now invoke eslint directly against
      # apps/web/eslint.config.mjs. The migration brought the project to
      # zero errors (warnings remain visible). New error-level regressions
      # block CI.
      - name: Lint (eslint v9 flat config)
        run: pnpm --filter web lint

      # M12-5 #86: promoted to hard gate after the lint cleanup closed
      # the type-error inventory enumerated in M10-6. `tsc --noEmit`
      # ran clean as of the M12-5 close.
      - name: Typecheck (tsc --noEmit)
        run: pnpm --filter web typecheck

      # M12-5 #86: promoted to hard gate alongside typecheck. The
      # M11-1 F164 production-build hydration crash demonstrated that
      # `next dev` skips RSC code paths that only execute under the
      # full SSR-hydration path of `next build`, so the build step is
      # the only reliable guard against that class of regression.
      - name: Build (next build)
        env:
          # next build requires these env vars to be present (referenced
          # in next.config.mjs and the build script). They are dummy
          # placeholders for CI — the actual values are injected at
          # deploy time. Without them next.config.mjs logs "EMPTY" but
          # the build itself does not fail on missing values.
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
        run: pnpm --filter web build
