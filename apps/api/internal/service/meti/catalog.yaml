  - id: meti.sbom_operation.01
    phase: sbom_operation
    title_ja: 脆弱性監視プロセスを確立
    title_en: Establish a vulnerability monitoring process
    description_ja: |
      手引 ver 2.0 第 7 章の脆弱性管理プロセスに従い、 SBOM 内の各コンポーネント
      を脆弱性データベースと突き合わせる定常運用 (実行頻度・担当・SLA) を
      確立する。
    description_en: |
      Following Chapter 7 of the ver 2.0 guidance, establish steady-state
      operations (cadence, owner, SLA) that match each SBOM component
      against vulnerability databases.
    evaluator_hint: "Auto-signal: scan_settings.vuln_scan_enabled is true AND last scan_tracker entry is within configured cadence."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.1 脆弱性特定フェーズ / 第6章 6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施 (checklist No.1 脆弱性対応)"
    notes: |
      M10-2: primary PDF 第7章 「脆弱性管理プロセスの具体化」 (ver 2.0
      新規、 L.3772+) と 6.1 「SBOM に基づく脆弱性管理、 ライセンス管理
      等の実施」 (L.3613) checklist No.1 「脆弱性に関する SBOM ツールの
      出力結果を踏まえ、 深刻度の評価、 影響度の評価、 脆弱性の修正、
      残存リスクの確認、 関係機関への情報提供等の脆弱性対応を行う」
      (L.3615-3616) に対応。 catalog 表現「実行頻度・担当・SLA」 は primary
      の 7.3 プロセス全体像 (L.3925+) や 6.2「自動で脆弱性情報が更新・
      通知される SBOM ツールを用いることで、 新たな脆弱性に関する情報を
      即座に把握することができる」 (L.3733-3736) を SLA 化した distillation。
      旧 catalog の「表：6.1.1 No.1」 は IPA 二次資料番号。 primary 6.1 の
      正確な見出しは「SBOM に基づく脆弱性管理、 ライセンス管理等の実施」
      (脆弱性 + ライセンス + 等 を 1 節に統合)。

  - id: meti.sbom_operation.02
    phase: sbom_operation
    title_ja: 脆弱性情報源 (NVD / JVN / KEV / GHSA / JPCERT) を特定
    title_en: Identify vulnerability information sources (NVD / JVN / KEV / GHSA / JPCERT)
    description_ja: |
      参照する脆弱性データベースを明示し、 同期頻度 (例: NVD 24h, KEV 24h,
      JVN 24h) と 重要度通知の閾値 (例: CVSS 7.0 以上) を定義する。
    description_en: |
      Enumerate the vulnerability databases consulted, define the
      synchronisation cadence (e.g. NVD 24h, KEV 24h, JVN 24h) and the
      severity-notification threshold (e.g. CVSS ≥ 7.0).
    evaluator_hint: "Auto-signal: nvd, jvn, kev service tables have recent updated_at (<48h). Service files: apps/api/internal/service/{nvd,jvn,kev}.go."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.1 脆弱性特定フェーズ ((1.3) 対象とする脆弱性 DB の選択) / 第6章 6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施"
    notes: |
      M10-2: primary PDF 7.3 プロセス全体像の (1.3) 「対象とする脆弱性
      DB の選択」 (L.3951) と 7.4.1 脆弱性特定フェーズ (L.4031+) / 6.1
      本文「NVD、 JVN のような公的な脆弱性情報データベース以外に、 独自に
      脆弱性情報データベースを強化し、 脆弱性マッチングの範囲を拡大した
      ものがある」 (L.3653-3655) に対応。 catalog 列挙「NVD / JVN / KEV /
      GHSA / JPCERT」 は primary 例示 (NVD, JVN, OSV, ZDI, GitHub、 L.3835-
      3843) を SBOMHub の実装に合わせて選定した distillation。 同期頻度
      24h や CVSS 7.0 閾値は primary が直接示していない運用補助設計。
      旧 catalog の「表：6.1.1 No.2」 は IPA 二次資料番号。

  - id: meti.sbom_operation.03
    phase: sbom_operation
    title_ja: 脆弱性を優先付け (EPSS / SSVC / CVSS / KEV)
    title_en: Prioritise vulnerabilities (EPSS / SSVC / CVSS / KEV)
    description_ja: |
      検出された脆弱性に対し、 CVSS だけでなく EPSS (悪用予測スコア),
      KEV (既知悪用), SSVC (意思決定フレーム) を併用して対応順序を決定する。
    description_en: |
      For each detected vulnerability, use EPSS (exploit-probability),
      KEV (known exploited) and SSVC (decision framework) alongside CVSS
      to set the remediation order.
    evaluator_hint: "Auto-signal: vulnerabilities table has epss_score, ssvc_decision and kev_listed columns populated for ≥1 finding."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.2 脆弱性対応優先付けフェーズ ((2.1) 優先付け情報の選択・取得 / (2.2) 優先付け判断ツリー / (2.3) 優先度スコア評価)"
    notes: |
      M10-2: primary PDF 7.4.2 「脆弱性対応優先付けフェーズ」 (L.5317+) と
      7.3 全体像 (2.1) - (2.3) (L.3942-3965) に対応。 catalog 列挙「EPSS /
      SSVC / CVSS / KEV」 は primary が示す優先付け基準のうち SBOMHub
      実装済の 4 軸を選択した distillation。 旧 catalog の「表：6.1.1 No.4」
      は IPA 二次資料番号 (primary では 7.4.2 が主、 6.1 は脆弱性対応全般
      の上位節)。

  - id: meti.sbom_operation.04
    phase: sbom_operation
    title_ja: 脆弱性対応 (VEX 作成・承認・配布) を実施
    title_en: Execute vulnerability response (VEX authoring, approval, distribution)
    description_ja: |
      対応中 / 影響なし / 修正済の判断を VEX (CycloneDX VEX or CSAF) で表現
      し、 人による承認後に顧客へ配布する。 AI ドラフトは承認前の状態として
      扱う。
    description_en: |
      Express decisions (under_investigation / not_affected / fixed) as VEX
      (CycloneDX VEX or CSAF) and distribute to customers only after human
      approval. AI-drafted statements remain unapproved until reviewed.
    evaluator_hint: "Auto-signal: vex_statements rows exist for the project with status IN ('approved','distributed'). Service: apps/api/internal/service/vex.go."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.3 情報共有フェーズ / 7.4.4 脆弱性対応フェーズ ((4.2) SBOM・VEX 等の更新・共有)"
    notes: |
      M10-2: primary PDF 7.4.3 「情報共有フェーズ」 (L.6771+) と 7.4.4
      「脆弱性対応フェーズ (暫定対応・根本対応)」 (L.6900+) / 7.3 全体像
      (4.2)「SBOM・VEX 等の更新・共有」 (L.3995) / 2.5「ある製品が既知の
      脆弱性の影響を受けるかどうかを示す機械判読可能なセキュリティ勧告の
      一つとして、 VEX」 (L.2377-) に対応。 catalog 表現「対応中 / 影響
      なし / 修正済の判断を VEX (CycloneDX VEX or CSAF) で表現し、 人に
      よる承認後に顧客へ配布」 は primary の VEX 概念に SBOMHub の
      AI ドラフト + 人間承認ワークフローを重ねた distillation。 旧
      catalog の「6.1 コラム『VEX を用いた脆弱性管理』」 は primary PDF
      では独立コラムとして見出し化されておらず、 2.5 と第7章で分散言及。

  - id: meti.sbom_operation.05
    phase: sbom_operation
    title_ja: ライセンス違反 / コンプライアンス逸脱を確認
    title_en: Check for licence violations and compliance deviations
    description_ja: |
      組織のライセンスポリシー (禁止ライセンス / 要承認ライセンス) と SBOM
      内コンポーネントの宣言ライセンスを照合し、 違反を是正する。
    description_en: |
      Reconcile each component's declared licence against the organisation's
      licence policy (prohibited / approved-with-review) and remediate
      violations.
    evaluator_hint: "Auto-signal: license_policies exist for the tenant AND license violation count = 0. Service: apps/api/internal/service/license.go."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施 (checklist No.2 OSS ライセンス違反確認)"
    notes: |
      M10-2: primary PDF 6.1 「SBOM に基づく脆弱性管理、 ライセンス管理
      等の実施」 (L.3613) checklist No.2 「ライセンスに関する SBOM ツール
      の出力結果を踏まえ、 OSS のライセンス違反が発生していないかを
      確認する」 (L.3617-3618) と本文 (L.3712-3719: 「ライセンスコンプライ
      アンスの状況を確認」 / 「遵守不可能又は遵守困難なライセンス条件が
      確認された場合には、 利用コンポーネント自体の変更や利用方法の
      変更等、 対応を実施する」) に対応。 primary では脆弱性 + ライセンス
      + EOL が 6.1 という 1 節に統合されており、 旧 catalog の「6.2 SBOM
      に基づくライセンス管理 / 表：6.2.1 No.1-2」 という独立 sub-section
      は存在しない (これは IPA 二次資料の構成)。 catalog 表現「禁止
      ライセンス / 要承認ライセンス」 「license_policies」 は SBOMHub
      実装の policy table 名と整合させた distillation。

  - id: meti.sbom_operation.06
    phase: sbom_operation
    title_ja: EOL / End-of-Support コンポーネントを特定
    title_en: Identify EOL / end-of-support components
    description_ja: |
      endoflife.date 等を参照して EOL を迎えたランタイム / フレームワーク
      を特定し、 置換ロードマップを記録する。
    description_en: |
      Identify runtimes and frameworks that have reached end-of-life
      (e.g. via endoflife.date) and record a replacement roadmap.
    evaluator_hint: "Auto-signal: eol service has produced findings for the project. Service: apps/api/internal/service/eol.go."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施 (本文 EOL コンポーネントの特定は手作業)"
    notes: |
      M10-2: primary PDF 6.1 本文「SBOM ツールを用いることで、 対象
      ソフトウェアに含まれるコンポーネントにおける脆弱性やライセンスの
      情報を効率的に特定できる一方で、 ツールを用いてコンポーネントの
      EOL を特定することは一般に難しく、 手作業で特定することが必要と
      なる。 EOL に関する情報がないコンポーネントも存在するところ、
      可能な限りこのようなコンポーネントを使用しない等を設計時に考慮
      することが望まれる」 (L.3720-3723) に対応。 認識ポイント「SBOM
      ツールでコンポーネントの EOL を特定できない場合、 別途個別に調査
      する必要がある」 (L.3628) も同節。 catalog 表現「endoflife.date を
      参照、 置換ロードマップを記録」 は primary が示さない具体ツール
      (endoflife.date) と運用 (置換ロードマップ) を SBOMHub 実装側で補った
      distillation。 旧 catalog の「6.3 SBOM 情報の管理 / 表：6.3.1 No.2」
      は IPA 二次資料番号 (primary では 6.1 が主、 提供期間は 6.2 に
      別途記載)。

  - id: meti.sbom_operation.07
    phase: sbom_operation
    title_ja: SBOM を適切な期間 保管 (監査対応)
    title_en: Retain SBOMs for the required period (audit-ready)
    description_ja: |
      製品ライフタイム + 規制要求期間 (CRA: 製品サポート期間中, 業界規制
      別途) にわたって SBOM を保管し、 改ざんなく取り出せる状態を維持する。
      ハッシュやタイムスタンプによる完全性確認を可能にする。
    description_en: |
      Retain SBOMs for the product lifetime plus the period required by
      regulation (CRA: throughout the product support window; sector
      regulations as applicable) in a tamper-evident form retrievable on
      demand, with hash / timestamp integrity checks available.
    evaluator_hint: "Auto-signal: sboms table retention policy enforced — no rows hard-deleted within retention window (check audit_log for delete events)."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (checklist No.1 変更履歴も含めた一定期間保管 / 本文 保管期間 — 製品流通中・販売終了後の保証期間・サポート提供期間・交換部品提供期間・ライセンス指定期間)"
    notes: |
      M10-2: primary PDF 6.2 「SBOM 情報の管理」 (L.3725) checklist No.1
      「作成した SBOM は、 社外からの問合せがあった場合等に参照できる
      よう、 変更履歴も含めて一定期間保管する」 (L.3727-3728) と本文
      「保管期間は、 一般的に対象製品が市場に流通している間や対象
      サービスが提供されている期間は最低限としつつ、 販売終了後も、
      保証期間、 サポート提供期間、 交換部品の提供期間等に必要に応じて
      SBOM を参照する可能性があるため、 予め参照できるように準備して
      おく必要がある。 さらに、 使用しているコンポーネントのライセンス
      の条件で製品提供終了後 3 年等の個別の指定がある場合にはその期間も
      考慮する必要がある」 (L.3743-3748) に対応。 catalog 表現「ハッシュや
      タイムスタンプによる完全性確認」 は primary が直接示さず、 CRA や
      tamper-evident 要件として SBOMHub 実装側で補った distillation。
      旧 catalog の「6.3 SBOM 情報の管理 / 表：6.3.1 No.2 / 図：6.3.2」
      は IPA 二次資料番号 (primary では 6.2、 図 6.3.2 は存在しない)。

  - id: meti.sbom_operation.08
    phase: sbom_operation
    title_ja: インシデント対応プロセス (悪用検知時) を整備
    title_en: Establish an incident-response process (when exploitation is detected)
    description_ja: |
      KEV 追加 / EPSS 急上昇 / 悪用実例レポートを受領したコンポーネントに
      ついて、 顧客通知・暫定緩和策・恒久対応のタイムライン (24h 早期警告 /
      72h 詳細通知 / 最終報告) を整備する。 EU CRA Article 14 と整合させる。
    description_en: |
      For components added to KEV, with EPSS spikes, or with confirmed
      exploitation reports, define a timeline for customer notification,
      interim mitigation and permanent remediation (24h early warning /
      72h detailed notification / final report) consistent with EU CRA
      Article 14.
    evaluator_hint: "Auto-signal: cra_reports rows exist for the project with report_type IN ('early_warning','detailed_notification','final_report'). Service: apps/api/internal/service/cra/."
    source_section: "第7章 脆弱性管理プロセスの具体化 (ver 2.0 新規) — 7.4.3 情報共有フェーズ / 7.4.4 脆弱性対応フェーズ (暫定対応の周知 / 根本対応)"
    notes: |
      M10-2: primary PDF 第7章「脆弱性管理プロセスの具体化」 (L.3772+) /
      7.4.3 情報共有フェーズ (L.6771+) / 7.4.4 脆弱性対応フェーズ (暫定
      対応・根本対応) (L.6900+) / 表 7-1 課題全体像「暫定対応の周知・
      実施」 (L.3845-3848) に対応。 catalog 表現「24h 早期警告 / 72h
      詳細通知 / 最終報告」 「EU CRA Article 14」 は primary PDF が示さない
      EU CRA 由来の SLA タイムラインを SBOMHub 実装側で補った distillation。
      primary は SLA 時刻を規定せず「悪用検知時の対応手順を整備」 までの
      抽象度。

  - id: meti.sbom_operation.09
    phase: sbom_operation
    title_ja: SBOM 更新頻度を遵守
    title_en: Maintain SBOM update frequency
    description_ja: |
      ソフトウェア改変・依存追加・依存削除のたびに SBOM を更新する。 最低
      でも 30 日に 1 回の再生成を運用ルールとして固定する (ver 2.0 推奨)。
    description_en: |
      Update the SBOM on every software change, dependency addition or
      dependency removal. Pin a minimum cadence of regeneration every 30
      days as an operational rule (per ver 2.0 recommendation).
    evaluator_hint: "Auto-signal: latest sboms.created_at for the project is within 30 days."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (本文 SBOM に含まれる情報の定期更新)"
    notes: |
      M10-2: primary PDF 6.2 本文「SBOM の対象としたソフトウェアの内容が
      動的に変わるほか、 脆弱性の情報も日々更新されることを踏まえ、
      SBOM に含まれる情報は定期的に更新し、 管理する必要がある」 (L.3750-
      3751) に対応。 catalog 表現「30 日に 1 回」 は primary PDF が直接示
      さない数値で、 SBOMHub 運用ルールとして固定した distillation。
      旧 catalog の「6.3 SBOM 情報の管理 / 表：6.3.1 No.3」 は IPA 二次
      資料番号 (primary では 6.2)。

  - id: meti.sbom_operation.10
    phase: sbom_operation
    title_ja: 監査ログ (作成 / 共有 / 承認 / 配布) を記録
    title_en: Record audit logs (creation, sharing, approval, distribution)
    description_ja: |
      SBOM の生成・アップロード・共有・承認・配布の各イベントを操作者
      付きで記録し、 監査時に時系列でトレースできるようにする。
    description_en: |
      Log every event (generation, upload, sharing, approval, distribution)
      with the operator identity so an auditor can trace the lifecycle
      chronologically.
    evaluator_hint: "Auto-signal: audit_log table has rows for action IN ('sbom.created','sbom.shared','vex.approved','cra.distributed') for the project."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (本文 SBOM の改変履歴を資産管理システム等で保管 / 管理体制 — PSIRT・品質管理部門)"
    notes: |
      M10-2: primary PDF 6.2 本文「出荷済み製品と SBOM 情報とを対応
      づけられるよう、 SBOM の改変履歴も含めて資産管理システム等で保管
      することも想定される」 (L.3748-3749) / 「SBOM の管理体制について、
      脆弱性管理という観点を踏まえると、 組織内の PSIRT 又はそれに類
      する部門が主導して SBOM の管理を行うのが望ましい」 (L.3758-3766)
      に対応。 catalog 表現「sbom.created / sbom.shared / vex.approved /
      cra.distributed の action 列挙」 は SBOMHub の audit_log スキーマと
      整合させた distillation。 primary PDF は具体的 action 名を示さず、
      「変更履歴も含めて保管」 までの抽象度。 旧 catalog の「6.3 SBOM
      情報の管理 / 表：6.3.1 No.1」 は IPA 二次資料番号 (primary では 6.2)。

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.sbom_operation.11
    phase: sbom_operation
    title_ja: SBOM 提供期間を個別運用 (顧客 / 製品ライン別)
    title_en: Operate per-customer / per-product SBOM provision windows
    description_ja: |
      製品ライフタイム + 規制要求期間 (sbom_operation.07) の枠組みを前提として、
      顧客 / 製品ライン / 出荷地域 / 契約タイプ毎に個別の SBOM 提供期間
      (開始日 / 終了日 / 延長条件 / 再提供 SLA) を運用する。 期間満了時の
      通知・延長判断・終了処理を SLA として定義し、 監査ログに記録する (6.3)。
    description_en: |
      Building on the lifetime + regulatory retention framework
      (sbom_operation.07), operate per-customer / per-product-line /
      per-shipping-region / per-contract-type SBOM provision windows
      (start, end, renewal conditions, re-provision SLA). Define
      notification, renewal-decision and termination procedures as an
      SLA and capture them in the audit log (6.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 保管 (sbom_operation.07) との重複を避けるため、 ここでは「顧客 / 製品ライン毎の提供期間が個別運用されているか」 (project metadata の retention_window / customer_id 紐付け / provision_end_at 配列) を判定したい。 M10-2 以降の hook 候補: project_customer_provision_windows テーブル、 sboms.retention_end_at 個別列。"
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (本文 保管期間の検討要素 — 保証期間・サポート期間・ライセンス条件別の個別指定)"
    notes: |
      M10-2: primary PDF 6.2 本文「使用しているコンポーネントのライセンス
      の条件で製品提供終了後 3 年等の個別の指定がある場合にはその期間も
      考慮する必要がある」 (L.3747-3748) を、 顧客 / 製品ライン / 出荷地域 /
      契約タイプ別の個別運用にまで拡張した distillation。 primary PDF は
      製品ライン別運用を直接 checklist 化しておらず、 出自は IPA 二次
      資料 表：6.3.1 No.2「SBOM 提供期間 — 顧客 / 製品ライン別個別運用」。
      sbom_operation.07 (6.2 保管期間の全体方針) との分担: 07 が「ライフ
      タイム + 規制要求期間の枠組み」、 11 が「個別顧客 / 製品ライン毎の
      開始日・終了日・延長条件・再提供 SLA」 にフォーカス。 旧 catalog の
      「6.3 / 表：6.3.1」 は IPA 二次資料番号 (primary では 6.2)。
