    source_section: "第2章 SBOM の概要 — 2.3 SBOM の「最小要素」 (表 2-3 / 表 2-4 NTIA Minimum Elements) + 第5章 5.2 SBOM の作成"
    notes: |
      M10-2: primary PDF 2.3 「SBOM の『最小要素』」 (L.1171-1354) と 表 2-3
