      公開リンク」 「再配布禁止 / 保管期間 / 開示範囲」 は primary の
      「製品に組み込む / アクセス可能なリポジトリで公開 / Web ページで
      公開 / SBOM ツールで共有」 (L.3598-3600) を一般化 + 契約条項
      (付録 9) を取り込んだ distillation。 旧 catalog の「表：5.3.1 No.1-3」
      は IPA 二次資料番号。

  - id: meti.sbom_creation.08
    phase: sbom_creation
    title_ja: SBOM のバージョン管理と差分追跡を実施
    title_en: Version-control SBOMs and track diffs
    description_ja: |
      ソフトウェアリリースごとに SBOM を版管理し、 前版との差分 (追加 / 削除 /
      バージョン更新) を可視化する。 差分が顧客通知トリガーになる場合は
      自動通知する。
    description_en: |
      Version-control the SBOM at each release and visualise the diff
      against the previous version (added, removed, updated components).
      If diffs should trigger customer notification, automate the alert.
    evaluator_hint: "Auto-signal: sbom_diff service exists and ≥2 sbom revisions exist for the project (so diffs are computable)."
    source_section: "第6章 SBOM 運用・管理フェーズ — 6.2 SBOM 情報の管理 (checklist No.1 変更履歴も含めた SBOM 保管 / 本文 SBOM の改変履歴 — 資産管理システム保管)"
    notes: |
      M10-2: primary PDF 6.2 「SBOM 情報の管理」 (L.3725) checklist No.1
      「作成した SBOM は、 社外からの問合せがあった場合等に参照できる
      よう、 変更履歴も含めて一定期間保管する」 (L.3727-3728) と本文
      「出荷済み製品と SBOM 情報とを対応づけられるよう、 SBOM の改変
      履歴も含めて資産管理システム等で保管することも想定される」
      (L.3748-3749) / 「SBOM に含まれる情報は定期的に更新し、 管理する
      必要がある」 (L.3750-3751) に対応。 catalog 表現「リリースごとに
      SBOM を版管理、 前版との差分 (追加 / 削除 / バージョン更新) を
      可視化、 顧客通知トリガーとなる場合は自動通知」 は primary の
      「変更履歴」 を CI 連動の自動 diff + 通知に拡張した distillation。
      旧 catalog の「6.3 SBOM 情報の管理 / 表：6.3.1 No.3」 は IPA 二次
      資料番号 (primary では 6.2)。

  - id: meti.sbom_creation.09
    phase: sbom_creation
    title_ja: サプライヤー受領 SBOM のマージ / 検証
    title_en: Merge and validate supplier-provided SBOMs
    description_ja: |
      自社が再配布する成果物にサプライヤー製コンポーネントが含まれる場合、
      その SBOM を受領し、 自社 SBOM にマージするか リンクするかを定め、
      受領 SBOM の妥当性 (署名・タイムスタンプ・形式準拠) を検証する。
    description_en: |
      When shipping artefacts that contain supplier-built components,
      decide whether to merge or link the supplier's SBOM into your own,
      and validate the supplier SBOM (signature, timestamp, format
      conformance) before accepting it.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='create_09'. Future hook: sboms.source ('uploaded' vs. 'merged') column."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.2 SBOM の作成 (本文 サードパーティ提供 SBOM のインポート・突合) / 付録 9 SBOM 取引モデル (受領 SBOM の品質・責任、 ver 2.0 新規)"
    notes: |
      M10-2: primary PDF 5.2 本文「サードパーティや OSS コミュニティ等
      の第三者から提供されたコンポーネントを使用している場合は、 当該
      コンポーネントの SBOM の提供を受けることができる場合もある」
      (L.3522-3526) / 「サプライチェーン上でのコンポーネントの書換えや
      不正改ざんを把握するためには、 第三者から提供された SBOM と自組織
      で作成した SBOM を突合し、 整合性を確認することが効果的である」
      (L.3542-3544) に対応。 catalog 表現「マージするか リンクするかを
      定め、 受領 SBOM の妥当性 (署名・タイムスタンプ・形式準拠) を
      検証する」 は primary の「整合性を確認」 を merge/link 運用 +
      validation 観点に拡張した distillation。 5.2 自体は checklist 形式の
      明示項目ではなく本文段落に対応する点に注意。

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.sbom_creation.10
    phase: sbom_creation
    title_ja: SBOM 共有プロセスを個別運用 (受領者管理 / 通知)
    title_en: Operate SBOM sharing per recipient (audience management, notifications)
    description_ja: |
      SBOM 共有方法・配布契約 (sbom_creation.07) を整備した上で、 個別受領者
      毎の共有実績 (誰に / いつ / どの版を / どのチャネルで送付したか) を
      記録し、 更新版発行時の通知・引き渡し済 SBOM の差替えを運用する。
      受領者リスト / 連絡先 / 共有 SBOM 履歴を台帳化し、 監査時に提示できる
      状態を維持する (5.3)。
    description_en: |
      After establishing sharing channels and distribution terms
      (sbom_creation.07), operate per-recipient SBOM sharing: record who
      received which SBOM revision, when, through which channel; notify
      recipients on new revisions; and replace previously delivered SBOMs
      as needed. Maintain a ledger of recipients, contacts and shared-SBOM
      history that can be presented on audit (5.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 配布契約整備 (sbom_creation.07) との重複を避けるため、 ここでは「個別運用が回っているか」 (公開リンクのアクセスログ / public_links.created_at 系列 / 通知配信履歴) を判定したい。 M10-2 以降の hook 候補: public_link_access_logs テーブル、 notification_deliveries テーブル。"
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.3 SBOM の共有 (本文 動的更新・利用者ごとの共有方法選定)"
    notes: |
      M10-2: primary PDF 5.3 本文「多くの SBOM は、 コンポーネントの
      バージョンアップ等により作成後も動的に内容が変わることに留意する
      必要がある」 (L.3582-3583) / 「SBOM 対象ソフトウェアの特性や更新の
      頻度、 利用者における SBOM 利用状況等を踏まえ、 どの方法で共有する
      かを検討することが望まれる」 (L.3601-3602) に対応。 catalog 表現
      「受領者リスト / 連絡先 / 共有 SBOM 履歴を台帳化、 監査時に提示
      できる状態を維持」 は primary PDF に独立 checklist 項目がなく、
      IPA 二次資料 表：5.3.1 No.4「受領者管理・通知・更新版差替え」 由来。
      sbom_creation.07 (5.3 全体の配布契約整備) との分担: 07 が「枠組み
      整備」、 10 が「個別受領者運用 (誰に / いつ / どの版を / どの
      チャネルで)」 にフォーカス。 出自は IPA 二次資料。

  # --------------------------------------------------------------------------
  # Phase 3 — SBOM 運用・管理フェーズ (sbom_operation) : 11 items
  #   (M3-3 で 10 items / M8-1 で +1: 6.3 SBOM 提供期間 個別運用)
