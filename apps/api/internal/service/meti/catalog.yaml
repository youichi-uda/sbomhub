# METI SBOM Catalog
# (M3-3 #39 / M5-6 #52 / M8-1 #62 / M8-2 #63 / M10-2 #75)
#
# Self-assessment criteria derived from "ソフトウェア管理に向けた SBOM
# (Software Bill of Materials) の導入に関する手引 ver 2.0" (経済産業省, 2024-08-29).
#
# M10-2 (issue #75, 2026-06-29): primary PDF を local fixture
# (/home/y1/Downloads/meti-sbom-v2/SBOMv2.pdf, SHA256
# cd24eff4e082286698f77253492b0eb07a515e3f70e9835ff8d3c1b276b7336a) として
# 取得し、 全 32 criteria の source_section / title_ja / description_ja を
# character-by-character で照合。 結果:
#   * source_section は primary PDF の実構造 (4.1 / 4.2 / 4.3 / 4.4 / 5.1 /
#     5.2 / 5.3 / 6.1 / 6.2 / 7.x) に整合させて全件修正。 M8-1 までの
#     "表：4.1.1 / 4.5.1 / 6.3.1" 等の表番号は IPA 二次資料 (2024-12 版) の
#     numbering であり primary PDF には存在しないため除去、 IPA 由来の
#     criterion (env_setup.01 / 09 / 10 / 11 / sbom_creation.10 /
#     sbom_operation.11) は notes: で出自を明示。
#   * title_ja / description_ja は意図的に "1-line distillation" として
#     維持。 primary PDF は段落形式のため verbatim 引用は UI 表示に
#     向かない。 各 criterion の notes: フィールドに distillation 鏡映と
#     primary PDF 該当節を記録。
#   * verification_status は "partial" を維持。 source_section の primary-
#     PDF anchor は M10-2 で完了したが、 title_ja / description_ja は
#     依然 distillation であり verbatim ではない。 「partial: anchors verified,
#     wording is curated distillation」 の意味として読み替える。
#
# M8-1 (issue #62, 2026-06-28): 27 → 32 criteria に拡張。 IPA 中核人材育成
# プログラム「SBOM 導入・運用の手引き」 (2024-12 版、 経産省 ver 2.0 を
# [1] として明示参照) の 32-item チェックリストと 1:1 対応を達成。 追加 5 件:
# env_setup.09 (構成図可視化, primary 4.1 No.2 由来) / env_setup.10 (ツール
# 導入・設定 個別運用, primary 4.3) / env_setup.11 (ツール学習 運用習熟度,
# primary 4.4) / sbom_creation.10 (5.3 共有 個別運用 IPA 由来) /
# sbom_operation.11 (6.2 提供期間 個別運用 IPA 由来)。
#
# Source:
#   primary 本書:
#     https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2.pdf
#     (SHA256 cd24eff4e082286698f77253492b0eb07a515e3f70e9835ff8d3c1b276b7336a,
#      local fixture: /home/y1/Downloads/meti-sbom-v2/SBOMv2.pdf, 4.8 MB)
#   概要 PDF:
#     https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2gaiyou.pdf
#     (SHA256 9d46a2f16e4f075b18671b646c8ce0006e057211b041e5a26efa2942c83d0567,
#      local fixture: /home/y1/Downloads/meti-sbom-v2/SBOMv2gaiyou.pdf, 1.2 MB)
#   English version:
#     https://www.meti.go.jp/english/policy/safety_security/cybersecurity/downloadfiles/sbom_tebiki02_en.pdf
#     (M10-2 時点で取得未確認、 title_en / description_en は best-effort
#      translation、 M10-2 の verification 対象外)
#   press release:
#     https://www.meti.go.jp/press/2024/08/20240829001/20240829001.html
#   IPA 二次資料 (cited where catalog draws from this rather than primary PDF):
#     https://www.ipa.go.jp/jinzai/ics/core_human_resource/final_project/2024/sbn8o10000001y6j-att/sbn8o10000001zcl.pdf
#
# Primary PDF の実章節構造 (M10-2 で確認済):
#   4. 環境構築・体制整備フェーズ
#     4.1 SBOM 適用範囲の明確化   — 6 checklist items (No.1 開発言語等 /
#         No.2 構成図 / No.3 契約形態 / No.4 規制 / No.5 組織内制約 / No.6 5W1H)
#     4.2 SBOM ツールの選定
#     4.3 SBOM ツールの導入・設定
#     4.4 SBOM ツールに関する学習
#   5. SBOM 作成・共有フェーズ
#     5.1 コンポーネントの解析
#     5.2 SBOM の作成
#     5.3 SBOM の共有
#   6. SBOM 運用・管理フェーズ
#     6.1 SBOM に基づく脆弱性管理、ライセンス管理等の実施
#     6.2 SBOM 情報の管理
#   7. 脆弱性管理プロセスの具体化 (ver 2.0 新規)
#     7.1 目的 / 7.2 課題・問題認識 / 7.3 プロセス全体像
#     7.4 各フェーズの手順と方法
#       7.4.1 脆弱性特定フェーズ / 7.4.2 脆弱性対応優先付けフェーズ
#       7.4.3 情報共有フェーズ / 7.4.4 脆弱性対応フェーズ
#   付録 8 SBOM 対応モデル / 付録 9 SBOM 取引モデル
#
# Schema (one entry):
#   - id:               stable, dotted, lowercase. "meti.<phase>.<seq>".
#   - phase:            "env_setup" | "sbom_creation" | "sbom_operation"
#   - title_ja:         short Japanese title
#   - title_en:         short English title
#   - description_ja:   longer Japanese description (what to do, why)
#   - description_en:   longer English description (what to do, why)
#   - evaluator_hint:   English free-form pointer that the M3-2 evaluator
#                       agent uses to pick which DB table / setting / scan
#                       artefact to inspect. Keep it concrete enough that a
#                       grep over the codebase resolves to the relevant
#                       service (e.g. "scan_settings.enabled_scanners",
#                       "sboms table created_at frequency").
#   - source_section:   chapter / sub-section reference in the official
#                       METI guidance (Japanese, format "第N章 N.N 小見出し").
#                       Required from M5-6 — the loader rejects criteria
#                       without it so a future authoring round cannot
#                       silently lose provenance. M10-2 で primary PDF
#                       integer-numbered sections (4.1 等) に整合済。
#   - notes:            (optional, M10-2 introduced) Japanese annotation
#                       explaining where the catalog wording is a
#                       deliberate distillation of a multi-paragraph
#                       primary PDF section, or where the criterion is
#                       sourced from the IPA secondary catalogue rather
#                       than the primary METI ver 2.0 PDF.

metadata:
  source: "経済産業省 ソフトウェア管理に向けた SBOM (Software Bill of Materials) の導入に関する手引 ver 2.0"
  source_url: "https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2.pdf"
  source_summary_url: "https://www.meti.go.jp/policy/netsecurity/wg1/SBOMv2gaiyou.pdf"
  source_version: "ver 2.0"
  source_published: "2024-08-29"
  last_synced: "2026-06-29"
  synced_by: "M10-2 issue #75 (M5-6 #52 / M8-1 #62 / M8-2 #63 を継承)"
  verification_status: "partial"
  verification_notes: |
    M10-2 (issue #75, 2026-06-29) で primary PDF (SBOMv2.pdf, SHA256
    cd24eff4e082286698f77253492b0eb07a515e3f70e9835ff8d3c1b276b7336a) 及び
    概要 PDF (SBOMv2gaiyou.pdf, SHA256
    9d46a2f16e4f075b18671b646c8ce0006e057211b041e5a26efa2942c83d0567) を
    user 環境で取得し、 全 32 criteria を character-by-character 照合。

    Methodology:
      1. pdftotext で primary PDF をテキスト抽出 (13,582 行)。
      2. 各 criterion の source_section に書かれた章節を primary PDF で grep
         し、 該当節の checklist 項目・本文と照合。
      3. wording deviation (whitespace / 旧字新字 / punctuation / 表現差) を
         記録。
      4. 結果に応じて source_section / notes / description_ja を更新。

    Findings:
      * source_section の primary-PDF anchor を全 32 件で完了。 M8-1 までは
        IPA 二次資料 (2024-12 版) の表番号 (表：4.1.1 / 表：4.5.1 / 表：6.3.1
        等) を引いていたが、 primary PDF にはこれらの表番号は存在しない。
        全件で primary PDF の section 番号 (4.1 / 4.2 / ... / 6.2 / 7.4.1 等)
        に書き換え。 旧表番号を引いていた notes は IPA 由来であることを
        明示。
      * primary PDF Chapter 4 の実構造は 4.1 / 4.2 / 4.3 / 4.4 の 4 節
        (M8-1 が想定していた 4.5 SBOM ツール学習 は実体は 4.4 SBOM ツールに
        関する学習)。 catalog の 4.5 / 4.4 / 4.3 参照は -1 シフトで修正。
      * primary PDF Chapter 6 は 6.1 (脆弱性管理・ライセンス管理 等) / 6.2
        (SBOM 情報の管理) の 2 節構成。 M8-1 が想定していた 6.3 SBOM 情報の
        管理 は実体は 6.2。 全 criterion の "6.3" 参照は "6.2" にシフト。
      * title_ja / description_ja は意図的な 1-line distillation として
        維持。 primary PDF の checklist 項目は段落形式 + 文末 "〜する"
        命令形のため UI dashboard / report heading への直接転載に不向き。
        各 criterion の notes: で primary PDF 該当節の原文と distillation
        鏡映を記録。
      * IPA 二次資料 由来の criterion (env_setup.01 担当部署・責任者 / 09
        構成図可視化 / 10 ツール導入・設定 個別運用 / 11 ツール学習
        運用習熟度 / sbom_creation.10 共有 個別運用 / sbom_operation.11
        提供期間 個別運用) は primary PDF に独立 checklist 項目を持たない
        ため、 notes: で IPA 由来であることを明示し、 primary PDF の関連
        節を補助参照として記録。
      * 0 件: wording を強制 verbatim 化したものなし。 distillation が
        UI 表示用として適切と判断。

    verification_status は引き続き "partial"。 source_section anchor 整合
    (= primary PDF の章節構造への正確な紐付け) は M10-2 で完了したが、
    title_ja / description_ja は curated distillation のため verbatim
    照合の意味では "full" を主張できない。 「partial: anchors verified,
    wording is curated distillation」 という意味として dashboard 側で
    読み替える。

    English version (sbom_tebiki02_en.pdf) は M10-2 時点で取得未確認。
    title_en / description_en は best-effort translation のまま、 M10-2
    の verification 対象外 (将来 wave に持ち越し)。

    過去 wave の経緯 (アーカイブ):
      M5-6 (issue #52, 2026-06-27): primary PDF への WebFetch / curl 全
      timeout。 IPA 二次資料を反映した初期 27 criteria を整備。
      M8-1 (issue #62, 2026-06-28): IPA 32-item 全項目との 1:1 対応を
      達成 (+5 criteria)。 wording exact-match は M8-2 持ち越し。
      M8-2 (issue #63, 2026-06-28): WebFetch 再試行、 meti.go.jp 全面
      遮断が継続することを確認。 catalog_test.go の title_ja exact-match
      regression を 32 件全件に拡張。 primary PDF 照合は user 環境
      offline 取得を待つ持ち越し。
      M10-2 (issue #75, 2026-06-29): user が offline で取得した primary
      / 概要 PDF を fixture とし、 全 source_section を primary 整合に
      書き換え。 wording distillation を notes: フィールド (今回新設)
      で正式に明文化。

criteria:
  # --------------------------------------------------------------------------
  # Phase 1 — 環境構築・体制整備フェーズ (env_setup) : 11 items
  #   (M3-3 で 8 items / M8-1 で +3: 4.1.4 構成図可視化 / 4.4 ツール導入設定 /
  #    4.5 ツール学習)
  # --------------------------------------------------------------------------
  - id: meti.env_setup.01
    phase: env_setup
    title_ja: SBOM 担当部署および責任者を明確化
    title_en: Designate the SBOM owner team and accountable role
    description_ja: |
      SBOM 導入・運用の責任者と担当部署を明確化し、 経営層・開発・セキュリティ部門との
      役割分担を文書化する。 兼任を可とするが、 SBOM の最終承認者 (例: PSIRT 長)
      を 1 名固定し、 連絡窓口を明示する。
    description_en: |
      Identify the team and accountable individual responsible for SBOM
      adoption and operation, and document the division of responsibilities
      between leadership, engineering and security. A single final approver
      (e.g. PSIRT lead) and a contact point must be designated even when
      the role is shared with another function.
    evaluator_hint: "Manual-only. No auto-signal in DB. Map to checklist_responses table check_id='setup_01' for human attestation."
    source_section: "第4章 環境構築・体制整備フェーズ — 章導入文 (体制整備の必要性) + 4.1 SBOM 適用範囲の明確化 (組織内の制約 — 体制の制約) + 6.2 SBOM 情報の管理 (PSIRT / 品質管理部門による管理体制)"
    notes: |
      M10-2: primary PDF に「SBOM 担当部署および責任者を明確化」 と直接対応
      する独立 checklist 項目は存在しない。 出自は IPA 二次資料
      「SBOM 導入・運用の手引き」 (2024-12 版) 表：4.2.1 No.1-2。 primary PDF
      では (1) 第4章 章導入文 (「SBOM に関する体制を整備することが必要」、
      L.2486-2489) (2) 4.1 No.5 「組織内の制約 (体制の制約、 コストの制約等)」
      (L.2498) (3) 6.2 SBOM 情報の管理 「SBOM の管理体制について、 脆弱性
      管理という観点を踏まえると、 組織内の PSIRT 又はそれに類する部門が
      主導して SBOM の管理を行うのが望ましい」 (L.3758-3766) — として
      分散的に言及されている。 catalog では IPA 二次資料に従って独立
      checklist 化。

  - id: meti.env_setup.02
    phase: env_setup
    title_ja: 対象ソフトウェアの開発言語・ビルド環境を整理
    title_en: Inventory the target software's languages and build environment
    description_ja: |
      SBOM 生成対象とするソフトウェアの開発言語、 ビルドツール (Maven / Gradle /
      npm / pip / Go modules 等)、 コンテナ / OS パッケージの構成を棚卸しし、
      どの言語に対し どの SBOM ツール (Syft / Trivy / cdxgen) を充てるかを決定する。
    description_en: |
      Inventory the languages, build tools (Maven / Gradle / npm / pip / Go
      modules, etc.) and container / OS-package layers used by the target
      software, and decide which scanner (Syft / Trivy / cdxgen) covers each
      stack so that no ecosystem is silently omitted from SBOM generation.
    evaluator_hint: "Auto-signal: sboms.bom_format and components.purl prefixes — distinct PURL types observed across all sboms for the project indicate ecosystems covered. Map to projects.metadata for declared stack vs. coverage gap."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.1 開発言語・コンポーネント形態・開発ツール等)"
    notes: |
      M10-2: primary PDF 4.1 checklist No.1 「対象ソフトウェアの開発言語、
      コンポーネント形態、 開発ツール等、 対象ソフトウェアに関する情報を
      明確化する」 (L.2493-2494) に対応。 catalog title_ja 「開発言語・
      ビルド環境を整理」 は primary PDF の例示 (L.2653-2687 開発言語・
      コンポーネント形態・開発環境ツール・ビルドツール・構成管理ツール・
      データ形式・動作環境) を 1 行に集約した distillation。 IPA 二次
      資料での No.3 (表：4.1.1) ではなく primary PDF では No.1。

  - id: meti.env_setup.03
    phase: env_setup
    title_ja: サプライヤー / OSS 配布元との契約形態・取引慣行を明確化
    title_en: Clarify contract and trading practices with suppliers / OSS distributors
    description_ja: |
      ソフトウェアの調達契約 / OSS ライセンス / SBOM 提供義務 / 脆弱性開示
      SLA を確認し、 サプライヤーから SBOM を受領する経路と頻度、 受領 SBOM の
      取り扱いポリシー (再配布可否 / 保管期間) を契約条項として明文化する。
    description_en: |
      Review procurement contracts, OSS licences, SBOM-delivery obligations
      and vulnerability-disclosure SLAs, and codify in contract clauses the
      channel and cadence by which SBOMs are received from suppliers, plus
      the handling policy (re-distribution rights, retention period).
    evaluator_hint: "Manual-only. No DB signal. Map to checklist_responses check_id='setup_03'. Future hook: supplier_contracts table when added."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.3 利用者及びサプライヤーとの契約形態・取引慣行) / 付録 9 SBOM 取引モデル (ver 2.0 新規)"
    notes: |
      M10-2: primary PDF 4.1 checklist No.3 「対象ソフトウェアの利用者
      及びサプライヤーとの契約形態・取引慣行を明確化する」 (L.2496)
      及び本文 (契約形態 / コンポーネント情報の提供 / 第三者コンポーネントの
      申告 / 脆弱性の通知 / 脆弱性の修正 / 納品形態 / 損害賠償責任 /
      知的財産権 / 改変の有無、 L.2798-2838) に対応。 catalog の
      「サプライヤー / OSS 配布元」 は primary の「利用者及びサプライヤー」
      の片側 (供給側) に焦点を絞った distillation。 付録 9 SBOM 取引
      モデル (L.10700+) は ver 2.0 新規追加。

  - id: meti.env_setup.04
    phase: env_setup
    title_ja: 適用される規制・要求事項を確認
    title_en: Confirm applicable regulations and requirements
    description_ja: |
      自社製品が出荷される地域 / 業界の規制 (EU CRA, 米国 EO 14028, NIST SP
      800-218, IPA 政府調達基準 等) を棚卸しし、 SBOM 形式・最小要素・提出
      期限の各要件を満たすよう設計に反映する。
    description_en: |
      Inventory the regulations and standards that apply to your product's
      shipping geography and industry (EU CRA, US EO 14028, NIST SP 800-218,
      IPA procurement guidelines, etc.) and reflect SBOM-format, minimum-
      element and submission-deadline requirements in the design.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_04'. Future hook: cra_reports presence indicates EU CRA scope is in play."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.4 SBOM に関する規制・要求事項)"
    notes: |
      M10-2: primary PDF 4.1 checklist No.4 「対象ソフトウェアの SBOM に
      関する規制・要求事項を確認する」 (L.2497) 及び本文 (米国大統領令
      M-22-18 / EU CRA / IMDRF / 薬機法、 L.2840-2854) に対応。 catalog の
      EU CRA, 米国 EO 14028, NIST SP 800-218, IPA 政府調達基準 は primary
      PDF の例示 (M-22-18 含む) を distillation 拡張したもの。

  - id: meti.env_setup.05
    phase: env_setup
    title_ja: 組織内制約 (機密情報の取り扱い / 公開範囲) を明確化
    title_en: Clarify organisational constraints (confidentiality, disclosure scope)
    description_ja: |
      SBOM に含まれる内部依存・社内ライブラリ情報の機密区分、 顧客への
      公開範囲、 第三者への提供範囲を定義し、 公開用 SBOM / 内部用 SBOM
      の使い分けポリシーを定める。
    description_en: |
      Define confidentiality classifications for internal dependencies and
      proprietary libraries that may appear in an SBOM, decide the disclosure
      scope toward customers and third parties, and establish a policy for
      separating public from internal SBOM variants.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_05'. Future hook: public_links.is_public flag history per project."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.5 SBOM 導入に関する組織内の制約)"
    notes: |
      M10-2: primary PDF 4.1 checklist No.5 「SBOM 導入に関する組織内の
      制約 (体制の制約、 コストの制約等) を明確化する」 (L.2498) と
      本文 (L.2855-2858 組織内の体制・コスト制約) に対応。 catalog 表現
      「機密情報の取り扱い / 公開範囲」 は primary PDF の (体制の制約、
      コストの制約等) を、 SBOM の公開可否 / 機密情報含有判断という
      実運用観点に拡張した distillation。 primary の文面とは厳密には
      乖離しているが、 SBOM 適用範囲決定時の組織内制約という上位
      範囲は包含されている。

  - id: meti.env_setup.06
    phase: env_setup
    title_ja: SBOM 適用範囲 (5W1H) を明確化
    title_en: Define the SBOM application scope (5W1H)
    description_ja: |
      いつ (リリース / 定期 / CI 毎)、 どこで (本番 / ステージング / 内部)、
      誰が (開発 / セキュリティ / 顧客)、 何を (対象製品・モジュール)、
      なぜ (規制 / 顧客要求 / 内部監査)、 どう (自動 / 手動) SBOM を扱うかを
      文書化する。
    description_en: |
      Document who creates and consumes the SBOM, when it is produced
      (release / scheduled / per-CI), where it covers (production / staging /
      internal), what targets and modules are in scope, why it is required
      (regulation / customer / internal audit) and how it is handled
      (automated vs. manual).
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_06'. Auto-augment: count of distinct project ids vs. scan_settings rows indicates whether scope is consistently configured."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.6 SBOM 適用範囲 (5W1H) / 表 4-1 SBOM 適用範囲 (5W1H))"
    notes: |
      M10-2: primary PDF 4.1 checklist No.6 「整理した情報に基づき、 SBOM
      適用範囲 (5W1H) を明確化する」 (L.2499) と 表 4-1 SBOM 適用範囲
      (5W1H) (L.2518-2644: 作成主体 / 作成タイミング / 活用主体 / 対象範囲 /
      作成手段 / 活用範囲 / フォーマット・項目) に対応。 catalog の
      「いつ / どこで / 誰が / 何を / なぜ / どう」 は表 4-1 の Who / When /
      What / Where / Why / How を日本語に展開した distillation。 旧 catalog
      では「表：4.1.2」 と記述していたが primary PDF では「表 4-1」 (4 章
      1 番目の表) が正しい。

  - id: meti.env_setup.07
    phase: env_setup
    title_ja: SBOM 生成ツールを選定・導入
    title_en: Select and install the SBOM generation tool
    description_ja: |
      対象スタックを網羅する SBOM 生成ツール (Syft, Trivy, cdxgen 等) を
      選定し、 ローカル / CI 双方で実行できる環境を構築する。 ツールは
      CycloneDX / SPDX 双方の主要出力に対応していることを確認する。
    description_en: |
      Select an SBOM-generation tool (Syft, Trivy, cdxgen, …) that covers
      the entire target stack and provision an environment that runs the
      tool both locally and in CI. Confirm the tool can emit both
      CycloneDX and SPDX in their major output variants.
    evaluator_hint: "Auto-signal: scan_settings.enabled_scanners is non-empty for the project (sbomhub-cli writes this) OR sboms.tool_name is non-null on the latest upload."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.2 SBOM ツールの選定 + 4.3 SBOM ツールの導入・設定"
    notes: |
      M10-2: primary PDF 4.2 「SBOM ツールの選定」 (L.2869、 選定の観点
      整理 + 複数ツール評価・選定) + 4.3 「SBOM ツールの導入・設定」
      (L.3145、 環境要件確認 + 取扱説明書に基づく導入) を 1 criterion に
      集約した distillation。 旧 catalog では「4.3 SBOM ツールの選定 +
      4.4 SBOM ツールの導入・設定」 と参照していたが primary PDF の
      章番号と -1 ずれていた。 表 4-2 SBOM ツールの選定の観点 (機能 /
      性能 / 解析可能な情報 / 解析可能なデータ形式 / コスト / 対応
      フォーマット / コンポーネント解析方法 / サポート体制 / 他ツール
      との連携 / 提供形態 / ユーザーインターフェース / 運用方法 /
      対応するソフトウェア開発言語 / 日本語対応、 L.2957-3129) も
      関連参照。 個別運用 (4.3 のみ) は env_setup.10 を参照。

  - id: meti.env_setup.08
    phase: env_setup
    title_ja: 担当者教育・トレーニングを実施
    title_en: Train the SBOM team
    description_ja: |
      SBOM 形式 (CycloneDX / SPDX) の読み方、 PURL / CPE 識別子、 VEX / VDR
      の意味、 脆弱性データベース (NVD / JVN / KEV) の使い方について
      担当者向けトレーニングを実施し、 受講記録を保管する。
    description_en: |
      Train the responsible team on reading SBOM formats (CycloneDX / SPDX),
      PURL / CPE identifiers, VEX / VDR semantics, and vulnerability
      databases (NVD / JVN / KEV); retain training records as audit
      evidence.
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='setup_08'. Future hook: tenant training_records table."
    source_section: "第4章 環境構築・体制整備フェーズ — 4.4 SBOM ツールに関する学習"
    notes: |
      M10-2: primary PDF 4.4 「SBOM ツールに関する学習」 (L.3202、
      checklist 2 項目: 「ツールの取扱説明書や README ファイルを確認して、
      SBOM ツールの使い方を習得する」 / 「ツールの使い方に関するノウハウ
      や各機能の概要は記録し、 組織内で共有する」) に対応。 catalog title_ja
      「担当者教育・トレーニングを実施」 は primary PDF の「ツールの
      使い方を習得 + ノウハウを記録・共有」 に CycloneDX / SPDX / PURL /
      CPE / VEX / VDR / NVD / JVN / KEV といった SBOM 周辺知識を含む
      包括的トレーニングへと拡張した distillation。 旧 catalog では「4.5
      SBOM ツールの学習」 と参照していたが primary PDF では 4.4 が正しい
      (-1 ずれ修正)。

  # ── M8-1 (issue #62) で追加 ──────────────────────────────────────────────
  - id: meti.env_setup.09
    phase: env_setup
    title_ja: 対象ソフトウェアの構成図を可視化
    title_en: Visualise the target software's architecture diagram
    description_ja: |
      SBOM 適用範囲を明確化するため、 対象ソフトウェアの構成図 (アプリ /
      コンテナ / OS / ファームウェア / サプライヤー提供コンポーネントの
      レイヤと境界) を可視化し、 SBOM 生成対象として組み込むコンポーネントの
      範囲・除外範囲を識別する。 構成図はリリース毎に更新する。
    description_en: |
      To clarify the SBOM application scope, visualise the target software's
      architecture diagram — the application, container, OS, firmware and
      supplier-supplied component layers and their boundaries — and identify
      which components are in / out of SBOM scope. Refresh the diagram on
      every release.
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 構成図 (architecture diagram) は現状 DB 表現を持たないため manual attestation 必須。 M10-2 以降の hook 候補: projects.architecture_diagram_url / sboms.RawData の metadata.component 階層解析。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.1 SBOM 適用範囲の明確化 (checklist No.2 対象ソフトウェアの正確な構成図 / 図 4-1 システム構成図の例 — 歯科用 CT)"
    notes: |
      M10-2: primary PDF 4.1 checklist No.2 「対象ソフトウェアの正確な
      構成図を作成し、 SBOM 適用の対象を可視化する」 (L.2495) 及び
      本文 (L.2689-2796: 自組織開発範囲 / 取引契約のあるサプライヤー /
      契約のないサプライヤーを可視化、 図 4-1 歯科用 CT システム構成図
      の実例) に対応。 旧 catalog の「4.1.4 対象ソフトウェアの構成図」
      「表：4.1.4」 は IPA 二次資料の sub-section 番号で primary PDF
      には存在しない (primary では 4.1 直下の checklist No.2 として
      列挙)。 catalog title_ja 「対象ソフトウェアの構成図を可視化」 は
      primary PDF の checklist 表現「構成図を作成し、 SBOM 適用の対象を
      可視化する」 を簡潔化した distillation。

  - id: meti.env_setup.10
    phase: env_setup
    title_ja: SBOM ツールを導入・設定 (個別運用)
    title_en: Install and configure the SBOM tool (per-deployment settings)
    description_ja: |
      選定済 SBOM 生成ツール (env_setup.07) を実行環境にインストールし、
      対象スタック毎の設定 (スキャン対象ディレクトリ / 除外パターン /
      ライセンス検出オプション / 出力形式 / lockfile 解決ポリシー 等) を
      個別に最適化する。 ツール選定 (4.3) とは独立した運用工程として
      導入・設定の妥当性を確認する (4.4)。
    description_en: |
      Install the previously-selected SBOM generation tool (env_setup.07) into
      the runtime environment, and tune per-stack settings (scan target
      directories, exclusion patterns, licence-detection options, output
      format, lockfile-resolution policy, etc.). Validate installation /
      configuration adequacy as an operational step distinct from tool
      selection (4.3).
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 ツール選定 (env_setup.07) との重複を避けるため、 ここでは個別設定値 (scan_settings.enabled_scanners 詳細 / exclusion patterns / output spec_version 固定) の妥当性を判定したい。 M10-2 以降の hook 候補: scan_settings.config_json 拡張、 sbomhub-cli の `doctor` 出力との突合。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.3 SBOM ツールの導入・設定"
    notes: |
      M10-2: primary PDF 4.3 「SBOM ツールの導入・設定」 (L.3145、 checklist
      2 項目: 「SBOM ツールが導入可能な環境の要件を確認し、 整備する」 /
      「ツールの取扱説明書や README ファイルを確認して、 SBOM ツールの
      導入・設定を行う」 + 本文 L.3183-3200 環境要件 / 取扱説明書 / 稼働
      監視) に対応。 旧 catalog では「4.4 SBOM ツールの導入・設定」 と
      参照していたが primary PDF では 4.3 が正しい (-1 ずれ修正)。
      env_setup.07 (ツール選定・導入) との分担: 07 は 4.2 + 4.3 を集約、
      10 は 4.3 のみを「個別運用 — スキャン対象ディレクトリ / 除外
      パターン / lockfile 解決ポリシー等」 の運用詳細にフォーカスした
      IPA 二次資料由来の独立 criterion。 出自は IPA 二次資料 表：4.4.1。

  - id: meti.env_setup.11
    phase: env_setup
    title_ja: SBOM ツールの学習 (運用習熟度確認)
    title_en: Practise with the SBOM tool (operator proficiency check)
    description_ja: |
      担当者教育 (env_setup.08) で習得した知識をもとに、 実際の対象ソフトウェアに
      対して SBOM 生成・解析エラー対応・出力検証を一通り実施し、 運用習熟度
      (生成所要時間 / エラー復旧時間 / 解釈の正確性) を測定する。 習熟度
      ベースラインを記録し、 ローテーション / 新規参画時の引き継ぎ基準とする。
    description_en: |
      Building on the basic training (env_setup.08), have operators run the
      tool end-to-end against the actual target software — generation, error
      handling, output validation — and measure proficiency (generation time,
      error-recovery time, interpretation accuracy). Record proficiency
      baselines and reuse them for rotation / onboarding handovers.
    evaluator_hint: "pending evaluator: M8-1 で追加、 auto-signal 未実装。 担当者教育 (env_setup.08) との重複を避けるため、 ここでは「教育受講後に実機で動かしたか」 のハンズオン実績 (sboms.created_by ユーザ多様性 / 直近 90 日の operator 数) を判定したい。 M10-2 以降の hook 候補: audit_logs の sbom.created actor 集計、 training_completion テーブル。"
    source_section: "第4章 環境構築・体制整備フェーズ — 4.4 SBOM ツールに関する学習"
    notes: |
      M10-2: primary PDF 4.4 「SBOM ツールに関する学習」 (L.3202) 本文
      「サンプル SBOM の作成等を通じて、 試行錯誤的にツールの使い方を
      習得することも効果的である」 (L.3228-3230) に対応。 env_setup.08
      (担当者教育) との分担: 08 は SBOM 形式 / PURL / VEX 等の知識教育、
      11 は実機ハンズオン演習・運用習熟度評価にフォーカスした IPA
      二次資料由来の独立 criterion。 旧 catalog では「4.5 SBOM ツールの
      学習」 と参照していたが primary PDF では 4.4 が正しい (-1 ずれ修正)。
      出自は IPA 二次資料 表：4.5.1。

  # --------------------------------------------------------------------------
  # Phase 2 — SBOM 作成・共有フェーズ (sbom_creation) : 10 items
  #   (M3-3 で 9 items / M8-1 で +1: 5.3 SBOM 共有 個別運用)
  # --------------------------------------------------------------------------
  - id: meti.sbom_creation.01
    phase: sbom_creation
    title_ja: SBOM 作成方針 (頻度 / トリガー / 粒度) を決定
    title_en: Decide the SBOM creation policy (frequency, trigger, granularity)
    description_ja: |
      SBOM をいつ (リリース毎 / マージ毎 / 夜次) どの粒度 (アプリ単位 /
      コンテナイメージ単位 / モジュール単位) で生成するかを決め、 CI に
      組み込む。 サプライヤー納品物については受領のたびに再生成する。
    description_en: |
      Decide the SBOM creation cadence (per release, per merge, nightly)
      and granularity (application, container image, module) and wire it
      into CI. For supplier-delivered artefacts, regenerate the SBOM at
      each delivery.
    evaluator_hint: "Auto-signal: COUNT(sboms WHERE project_id=...) per 30 days indicates cadence. scan_settings.schedule field indicates declared trigger."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.2 SBOM の作成 (checklist No.1 SBOM の項目・フォーマット・出力ファイル形式等の要件決定)"
    notes: |
      M10-2: primary PDF 5.2 「SBOM の作成」 (L.3511) checklist No.1
      「作成する SBOM の項目、 フォーマット、 出力ファイル形式等の SBOM
      に関する要件を決定する」 (L.3513) 及び 5.1 コンポーネントの解析の
      実証エビデンス (L.3306-3314 手動 30 人時 vs ツール 0.15 人時) を
      引用して、 「リリース毎 / マージ毎 / 夜次」 「アプリ / コンテナ /
      モジュール」 という CI 統合粒度に拡張した distillation。 primary
      PDF には頻度 / トリガー / 粒度 を直接の checklist 項目として
      列挙する箇所はなく、 これらは 5.1-5.2 全体の本文・実証示唆と
      6.2 「SBOM に含まれる情報は定期的に更新し、 管理する必要がある」
      (L.3750-3751) を運用ルール化した補助設計。 旧 catalog の「表：5.1.1
      No.2」 は IPA 二次資料の番号。

  - id: meti.sbom_creation.02
    phase: sbom_creation
    title_ja: SBOM 形式 (CycloneDX / SPDX) を選定
    title_en: Select the SBOM format (CycloneDX / SPDX)
    description_ja: |
      取引先 / 監査人 / 規制要件にあわせて CycloneDX または SPDX (あるいは
      両形式) を選定し、 形式バージョン (例: CycloneDX 1.5+, SPDX 2.3) を
      固定する。 VEX 同梱要件があれば CycloneDX を優先する。
    description_en: |
      Select CycloneDX, SPDX or both as the canonical SBOM format aligned
      with trading partner, auditor and regulatory needs, and pin the
      format version (e.g. CycloneDX 1.5+, SPDX 2.3). If VEX must be
      bundled, prefer CycloneDX.
    evaluator_hint: "Auto-signal: sboms.bom_format ('CycloneDX' or 'SPDX') and sboms.spec_version on latest upload."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.2 SBOM の作成 (checklist No.1 SBOM の項目・フォーマット・出力ファイル形式等の要件決定) + 第2章 2.4 SBOM フォーマットの例 (SPDX / CycloneDX / SWID タグ)"
    notes: |
      M10-2: primary PDF 5.2 checklist No.1 「作成する SBOM の項目、
      フォーマット、 出力ファイル形式等の SBOM に関する要件を決定する」
      (L.3513) と 第2章 2.4 SBOM フォーマットの例 (L.1355+: SPDX /
      CycloneDX の説明) に対応。 catalog 表現「CycloneDX 1.5+ / SPDX 2.3 /
      VEX 同梱要件があれば CycloneDX を優先」 は primary PDF が形式
      バージョンや VEX 同梱の優先方針を明示していない部分を補った
      運用 distillation。 旧 catalog の「表：5.2.1 No.1」 は IPA 二次資料
      番号。

  - id: meti.sbom_creation.03
    phase: sbom_creation
    title_ja: コンポーネントを解析し SBOM を生成
    title_en: Analyse components and generate the SBOM
    description_ja: |
      選定したツールでビルド成果物 / ソースリポジトリ / コンテナイメージを
      スキャンし、 直接依存と推移依存を漏れなく抽出した SBOM を生成する。
    description_en: |
      Scan build artefacts, source repositories and container images with
      the selected tool and produce an SBOM that captures direct and
      transitive dependencies without omissions.
    evaluator_hint: "Auto-signal: sboms exists for the project AND latest sbom has components count > 0."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (checklist No.1 対象ソフトウェアのスキャン) + 5.2 SBOM の作成 (checklist No.2 SBOM ツールを用いた SBOM 作成)"
    notes: |
      M10-2: primary PDF 5.1 checklist No.1 「SBOM ツールを用いて対象
      ソフトウェアのスキャンを行い、 コンポーネントの情報を解析する」
      (L.3243) と 5.2 checklist No.2 「SBOM ツールを用いて、 当該要件を
      満足する SBOM を作成する」 (L.3514) に対応。 catalog 表現「直接依存と
      推移依存を漏れなく抽出」 は primary 本文「コンポーネントの名称、
      サプライヤー名、 バージョン、 コンポーネント間の依存関係等を洗い
      出す」 (L.3319-3320) と「再帰的に利用されるコンポーネントも含めて
      対象とする」 (L.2589-2590) の集約 distillation。 旧 catalog の
      「表：5.1.1 No.1 / 表：5.2.1 No.2」 は IPA 二次資料番号。

  - id: meti.sbom_creation.04
    phase: sbom_creation
    title_ja: 解析エラー (パース失敗 / バージョン不明) を確認
    title_en: Confirm analysis errors (parse failure, unknown version)
    description_ja: |
      スキャナのエラーログ・警告を確認し、 「version: unknown」 や パース失敗
      で除外されたコンポーネントを残さない。 残存する場合は理由を記録する。
    description_en: |
      Review scanner error logs and warnings; do not leave components
      dropped as "version: unknown" or due to parse failures. Where they
      cannot be resolved, record the reason for the exception.
    evaluator_hint: "Auto-signal: COUNT(components WHERE version IS NULL OR version='unknown') for latest sbom should be 0 for a passing item."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (checklist No.2 SBOM ツールの解析ログ調査・解析中断・省略の確認)"
    notes: |
      M10-2: primary PDF 5.1 checklist No.2 「SBOM ツールの解析ログ等を
      調査し、 エラー発生や情報不足による解析の中断や省略がなく、 解析
      が正しく実行されたかを確認する」 (L.3244-3245) に対応。 本文
      「バージョン情報が誤って検出されたコンポーネントが複数存在した」
      (L.3359) / 「ツールの実行ログを確認し、 そのようなエラーが発生
      していないかを確認する」 (L.3500-3502) / 「『既知の未知』 として
      把握することが望まれる」 (L.3504-3506) を「version: unknown や
      パース失敗による除外を残さず、 残存する場合は理由を記録する」 と
      distillation。 旧 catalog の「表：5.1.1 No.3」 は IPA 二次資料番号
      (primary では No.2)。

  - id: meti.sbom_creation.05
    phase: sbom_creation
    title_ja: 誤検出・検出漏れを確認
    title_en: Verify false positives and false negatives
    description_ja: |
      ツール出力結果をそのまま用いず、 手動ビルド成果物 / package-lock /
      go.sum 等と突き合わせ、 誤検出 (実際には含まれない) と 検出漏れ
      (実際は含まれるが SBOM 未掲載) を確認する。
    description_en: |
      Do not rely on tool output as-is: cross-check against build manifests
      (package-lock, go.sum, etc.) to flag false positives (listed but not
      actually shipped) and false negatives (shipped but missing from the
      SBOM).
    evaluator_hint: "Manual-only. Map to checklist_responses check_id='create_03'. Future hook: diff sboms generated by Syft vs. Trivy and surface unique entries."
    source_section: "第5章 SBOM 作成・共有フェーズ — 5.1 コンポーネントの解析 (checklist No.3 誤検出・検出漏れの確認) + 図 5-1 コンポーネント解析結果の確認の観点及び確認方法"
    notes: |
